# ── DN7 Panel version + build + release notes ───────────────────────────────
# Single source of truth for a release. Display form:
#   DN7 Panel <codename> <version> (build <build>)   e.g.  Phanes 27.0.0 (build 1)
#
#   codename  release codename, one per year (Apple-style). Greek primordials in
#             cosmogonic order — Phanes, then Chaos, Gaia, Eros, Nyx, Aether, …
#   version   <year>.<major>.<minor>. year = Apple-style +1 (the 2026 line is 27);
#             major resets to 0 each new year. Bump for a real version.
#   build     an INDEPENDENT monotonic build number — never resets, unrelated to
#             the version (so it never has an awkward 27G99→…01 jump). Bump for
#             any published build; it only ever increases.
#
# CI on every push ALWAYS verifies the build (gate). It publishes a GitHub Release
# only when `build` is new (no tag b<build> yet) — otherwise it just gates, no
# release. On publish: tag v<version>, name "<codename> <version> (build <build>)",
# always marked Latest (never a prerelease). Deployed panels self-update straight
# from these GitHub releases via the fastest mirror line (src/infra/support/
# fetch.rs). codename + build compile into the binary (build.rs → DN7_CODENAME /
# DN7_BUILD); the numeric version rides in via Cargo.toml (CARGO_PKG_VERSION).
codename = "Phanes"
version = "27.0.0"
build = 2

# Per-language release notes (locale keys match the panel's i18n). The panel's
# "What's New" shows the entry for the current UI language; CI puts them all in
# the GitHub Release body + releases.json.
[notes]
"zh-CN" = "更新系统优化:面板现在会在 GitHub 直连与多个加速镜像之间自动竞速,用最快的一条线路下载更新,慢的或不通的线路自动跳过。不再需要手动选择下载源——更新更快、也更省心。"
"zh-TW" = "更新系統最佳化:面板現在會在 GitHub 直連與多個加速鏡像之間自動競速,用最快的一條線路下載更新,慢的或不通的線路自動跳過。不再需要手動選擇下載來源——更新更快、也更省心。"
"en" = "Faster updates: the panel now automatically races GitHub direct against several mirror lines and downloads from the fastest one, skipping any that are slow or unreachable. The manual download-source picker is gone — updating just works."
"ja" = "アップデートの高速化:パネルは GitHub 直結と複数のミラー回線を自動で競わせ、最速の回線から更新をダウンロードします(遅い・不通の回線は自動でスキップ)。ダウンロード元の手動切り替えは廃止され、より簡単になりました。"
