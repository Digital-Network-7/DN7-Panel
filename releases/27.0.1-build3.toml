# Archived snapshot of release.toml for: Phanes 27.0.1 (build 3)
# Files here back up each published release's version + notes, named
# <version>-build<build>.toml. Build 3 (27.0.1) adds three first-run deployment
# modes after the environment check — Quick (default), CLI custom, and a
# token-gated UI-custom web wizard. See the repo-root release.toml (and AGENTS.md
# "Versioning & releases") for the live scheme.
codename = "Phanes"
version = "27.0.1"
build = 3

[notes]
"zh-CN" = "首次部署新增三种方式。环境检测后可以选择:**快速部署**(默认)按服务器时区自动选语言,以公网 IP 直接起面板,账号 admin + 随机密码——首次登录会强制你改成自己的用户名和密码;**命令行自定义**是原来的终端交互向导;**网页自定义**会打印一条一次性安全链接,让你在浏览器里完成全部配置(访问地址、HTTPS、端口、管理员账号)。网页初始化由一次性令牌保护,完成前不暴露任何其他内容。"
"zh-TW" = "首次部署新增三種方式。環境偵測後可以選擇:**快速部署**(預設)依伺服器時區自動選語言,以公網 IP 直接啟動面板,帳號 admin + 隨機密碼——首次登入會強制你改成自己的使用者名稱與密碼;**命令列自訂**是原本的終端互動精靈;**網頁自訂**會印出一條一次性安全連結,讓你在瀏覽器中完成全部設定(存取位址、HTTPS、連接埠、管理員帳號)。網頁初始化由一次性權杖保護,完成前不會暴露任何其他內容。"
"en" = "Three first-run deployment modes. After the environment check you now choose how to set up: **Quick** (the default) auto-picks the language from the server's timezone and brings the panel up on your public IP with an admin account and a random password — first login then forces you to set your own username and password; **CLI custom** is the interactive terminal wizard; and **UI custom** prints a one-time secure link so you can do the whole setup in a browser (access address, HTTPS, ports, admin account). The web setup is served behind a single-use token — nothing else is exposed until you finish."
"ja" = "初回セットアップに 3 つの方式を追加。環境チェックの後、方法を選べます:**クイック**(既定)はサーバーのタイムゾーンから言語を自動選択し、グローバル IP でパネルを起動、アカウントは admin + ランダムパスワード——初回ログインで自分のユーザー名とパスワードへの変更を必須にします;**CLI カスタム**は従来の端末対話ウィザード;**UI カスタム**は使い捨ての安全なリンクを表示し、ブラウザーで全設定(アクセス先、HTTPS、ポート、管理者アカウント)を行えます。ウェブ初期化は使い捨てトークンで保護され、完了までは他の何も公開しません。"
