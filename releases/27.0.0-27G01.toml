# ── DN7 Panel version + release notes ───────────────────────────────────────
# Single source of truth for the release. Display form:
#   DN7 Panel <codename> <version>          e.g.  Phanes 27.0.0
#
#   codename  release codename, one per year (Apple-style). Sequence: Greek
#             primordials in cosmogonic order — Phanes (creation), then Chaos,
#             Gaia, Eros, Nyx, Aether, Uranus, Pontus, …  Turns over with the year.
#   version   <year>.<major>.<minor>. year = Apple-style +1 (the 2026 line is 27);
#             major resets to 0 each new year; all three are set BY HAND.
#
# On every push CI verifies the build, then compares this `version` to the latest
# released one:
#   • greater (or no releases yet) → a real release "<codename> <version>",
#     tagged v<version>, pushed to the dn7.cn stable channel;
#   • unchanged → a sub-build "<codename> <version> build <YY><Month><NN>"
#     (month letter A–L from the commit; NN from 00, resets each month), GitHub
#     only — NOT pushed to dn7.cn.
# The codename is compiled into the binary by build.rs (DN7_CODENAME); the numeric
# version rides in via Cargo.toml (CARGO_PKG_VERSION, stamped by CI).
codename = "Phanes"
version = "27.0.0"

# Per-language release notes (locale keys match the panel's i18n). The panel's
# "What's New" shows the entry for the current UI language; CI puts them all in
# the GitHub Release body + releases.json.
[notes]
"zh-CN" = "修复:在全新系统上首次初始化时,面板现在会自动加载 overlay / nf_tables 内核模块——此前若模块尚未加载,会误报「内核不支持 overlayfs」而无法启动。"
"zh-TW" = "修復:在全新系統首次初始化時,面板現在會自動載入 overlay / nf_tables 核心模組——此前若模組尚未載入,會誤報「核心不支援 overlayfs」而無法啟動。"
"en" = "Fix: on a fresh system, first-run setup now auto-loads the overlay / nf_tables kernel modules — previously it could wrongly abort with \"Kernel lacks overlayfs\" when the module simply wasn't loaded yet."
"ja" = "修正:新規システムでの初回セットアップ時に overlay / nf_tables カーネルモジュールを自動で読み込むようになりました——これまではモジュール未ロード時に「Kernel lacks overlayfs」と誤って中断することがありました。"
