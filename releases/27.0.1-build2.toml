# Archived snapshot of release.toml for: Phanes 27.0.1 (build 2)
# Files here back up each published release's version + notes, named
# <version>-build<build>.toml. Build 2 (27.0.1) upgrades the init wizard and makes
# the website + panel ports configurable. See the repo-root release.toml (and
# AGENTS.md "Versioning & releases") for the live scheme.
codename = "Phanes"
version = "27.0.1"
build = 2

[notes]
"zh-CN" = "初始化向导升级 + 端口可配置。向导会自动检测内网/公网 IP 并让你选择访问方式,密码放宽到 6 位起,装完直接给出登陆地址与密码。网站的 HTTP/HTTPS 端口和面板端口现在都可自定义——面板可走独立端口,把 80/443 留给托管网站(80 仍会自动用于证书签发)。同时修复了自定义端口下的若干问题。"
"zh-TW" = "初始化精靈升級 + 連接埠可設定。精靈會自動偵測內網/公網 IP 並讓你選擇存取方式,密碼放寬到 6 位起,裝完直接給出登入位址與密碼。網站的 HTTP/HTTPS 連接埠和面板連接埠現在都可自訂——面板可走獨立連接埠,把 80/443 留給託管網站(80 仍會自動用於憑證簽發)。同時修正了自訂連接埠下的若干問題。"
"en" = "Initialization wizard upgraded, plus configurable ports. The wizard now detects your LAN / public IP and lets you pick how the panel is reached, passwords can be as short as 6 characters, and setup finishes by showing the login address and password. The website HTTP/HTTPS ports and the panel's own port are now configurable — the panel can run on its own port, keeping 80/443 for hosted websites (80 stays bound for certificate issuance). Also fixes several issues around custom ports."
"ja" = "初期化ウィザードの強化と、ポートの設定対応。ウィザードは LAN／グローバル IP を自動検出してアクセス方法を選べるようになり、パスワードは 6 文字以上に緩和、セットアップの最後にログイン先アドレスとパスワードを表示します。Web サイトの HTTP/HTTPS ポートとパネル自体のポートを設定でき、パネルを独立したポートで運用して 80/443 を公開サイト用に残せます(80 は証明書発行のため常時バインド)。カスタムポート周りの不具合も複数修正しました。"
