# Archived snapshot of release.toml for: Phanes 27.0.0 (build 1)
# Files here back up each published release's version + notes, named
# <version>-build<build>.toml. This is the first formal release. See the repo-root
# release.toml (and AGENTS.md "Versioning & releases") for the live scheme.
codename = "Phanes"
version = "27.0.0"
build = 1

[notes]
"zh-CN" = "DN7 Panel 的首个正式版本。一个纯静态的单文件二进制,在网页控制台里管理整台 Linux 服务器——监控、网页终端、容器、网站、文件五合一,零外部依赖、开箱即用,任意 Linux 发行版皆可运行。代号 Phanes(希腊神话的原初创世之神),标记万物之始。"
"zh-TW" = "DN7 Panel 的首個正式版本。一個純靜態的單一檔案二進位,在網頁主控台管理整台 Linux 伺服器——監控、網頁終端機、容器、網站、檔案五合一,零外部相依、開箱即用,任意 Linux 發行版皆可執行。代號 Phanes(希臘神話的原初創世之神),標記萬物之始。"
"en" = "The first release of DN7 Panel — a single, fully static binary that manages an entire Linux server from one web console: monitoring, a web terminal, containers, websites, and files, with zero external dependencies, running on any Linux distribution. Codenamed Phanes, the Greek primordial of creation — the beginning of everything."
"ja" = "DN7 Panel の最初の正式リリース。監視・Web ターミナル・コンテナ・Web サイト・ファイル管理を 1 つの Web コンソールに統合した、完全静的な単一バイナリの Linux サーバー管理パネルです。外部依存はゼロ、あらゆる Linux ディストリビューションで動作します。コードネームは Phanes——ギリシャ神話の原初の創造神、すべての始まりを象徴します。"
