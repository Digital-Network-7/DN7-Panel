[package]
name = "teaops-agent"
version = "0.1.0"
edition = "2021"
description = "TeaOps monitoring agent - collects system metrics and reports to backend"

[dependencies]
tokio = { version = "1", features = ["full"] }
tokio-tungstenite = { version = "0.24", features = ["rustls-tls-webpki-roots"] }
futures-util = "0.3"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls-webpki-roots", "blocking", "stream"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sysinfo = "0.31"
anyhow = "1"
fs2 = "0.4"
portable-pty = "0.9"
qrcode = { version = "0.14", default-features = false }
aes-gcm = "0.10"
sha2 = "0.10"
rand = "0.8"
daemonize = "0.5"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
# Docker management over the daemon socket (no `docker` CLI dependency).
bollard = "0.17"
# Tar streaming for container file transfer via the docker archive API.
tar = "0.4"
# Pure-Rust certificate generation (self-signed) — replaces the openssl CLI.
rcgen = "0.13"
# Pure-Rust ACME (Let's Encrypt) client — replaces acme.sh + curl/wget.
instant-acme = "0.7"
# Async traits / stream helpers used by the docker + acme integrations.
futures = "0.3"
bytes = "1"
# Per-process network accounting (Linux): SOCK_DIAG netlink for per-socket
# cumulative TCP byte counters, mapped to pids via /proc. Pure Rust, no C deps
# (keeps the musl-static build intact). Linux-only; gated in code by target_os.
[target.'cfg(target_os = "linux")'.dependencies]
netlink-sys = "0.8"
netlink-packet-core = "0.7"
netlink-packet-sock-diag = { version = "0.4", features = ["rich_nlas"] }

[profile.release]
opt-level = 3
lto = true
