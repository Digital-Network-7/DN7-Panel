# cargo-deny configuration — supply-chain gate for CI (see .github/workflows).
# Run locally with: cargo deny check

[advisories]
version = 2
# Fail on known-vulnerable advisories and yanked crates. Add a specific RUSTSEC
# id to `ignore` (with a comment + tracking link) only when there is no fixed
# upstream version available.
yanked = "deny"
ignore = [
    # daemonize: unmaintained, no safe upgrade available. Used for the
    # supervisor's background daemonization. Revisit / replace upstream.
    # https://rustsec.org/advisories/RUSTSEC-2025-0069
    "RUSTSEC-2025-0069",
    # rustls-pemfile: unmaintained. Used directly by crates/dn7-edge (build.rs) to
    # parse the panel-managed PEM cert/key files for the :443 listener. Revisit
    # when the edge migrates to rustls-pki-types PEM parsing.
    # https://rustsec.org/advisories/RUSTSEC-2025-0134
    "RUSTSEC-2025-0134",
]

[bans]
# Duplicate versions of the same crate are a warning (common with transitive
# deps), not a hard failure; wildcard version requirements are discouraged.
multiple-versions = "warn"
wildcards = "warn"
allow-wildcard-paths = true

[licenses]
version = 2
confidence-threshold = 0.8
# Permissive licenses only. Every direct dependency in this tree is pure-Rust
# and MIT/Apache-2.0-family; this list covers their transitive closure.
allow = [
    # This project's own license. Dependencies remain permissive (below); the
    # AGPL applies only to the dn7-panel crate itself.
    "AGPL-3.0-only",
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unlicense",
    # CDLA-Permissive-2.0: webpki-roots (Mozilla CA bundle) — a permissive data
    # license; the crate ships only the trusted-roots list, no code restriction.
    "CDLA-Permissive-2.0",
]

[sources]
# Only crates.io is allowed; unknown registries / git sources fail the gate.
unknown-registry = "deny"
unknown-git = "deny"
