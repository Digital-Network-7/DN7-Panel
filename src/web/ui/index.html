<!DOCTYPE html>
<html lang="zh-CN" data-mode="auto">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>TeaOps 本机管理</title>
<style>
  /* ---- Theme tokens: dark (default) ---- */
  :root {
    --bg:#070b14; --panel:rgba(18,26,42,0.72); --panel-solid:#0e1626; --panel2:rgba(8,13,24,0.85);
    --line:rgba(90,120,180,0.18); --line2:rgba(90,120,180,0.30); --fg:#dbe6f5; --mut:#8294b0;
    --cy:#22d3ee; --br:#3b82f6; --vio:#8b5cf6; --ok:#34d399; --err:#fb7185; --warn:#fbbf24;
    --glow:0 0 24px rgba(34,211,238,0.18); --shadow:0 10px 40px rgba(0,0,0,0.4);
    --hov:rgba(60,80,120,0.14); --acc-soft:rgba(59,130,246,0.14);
    --app-bg:
      radial-gradient(1200px 700px at 85% -10%, rgba(59,130,246,0.16), transparent 60%),
      radial-gradient(900px 600px at -10% 110%, rgba(139,92,246,0.14), transparent 55%),
      var(--bg);
  }
  /* ---- Light theme overrides ---- */
  html[data-theme="light"] {
    --bg:#eef2f8; --panel:rgba(255,255,255,0.82); --panel-solid:#ffffff; --panel2:rgba(255,255,255,0.92);
    --line:rgba(40,70,120,0.14); --line2:rgba(40,70,120,0.24); --fg:#1b2536; --mut:#5d6b85;
    --cy:#0891b2; --br:#2563eb; --vio:#7c3aed; --ok:#059669; --err:#e11d48; --warn:#d97706;
    --glow:0 0 24px rgba(37,99,235,0.10); --shadow:0 10px 30px rgba(30,50,90,0.12);
    --hov:rgba(40,70,120,0.07); --acc-soft:rgba(37,99,235,0.10);
    --app-bg:
      radial-gradient(1100px 650px at 88% -12%, rgba(37,99,235,0.10), transparent 60%),
      radial-gradient(820px 560px at -8% 112%, rgba(124,58,237,0.08), transparent 55%),
      var(--bg);
  }
  * { box-sizing:border-box; }
  html,body { height:100%; }
  body {
    margin:0; color:var(--fg); font:14px/1.55 -apple-system,Segoe UI,Roboto,"PingFang SC",sans-serif;
    background:var(--app-bg); background-attachment:fixed; transition:background .25s,color .25s;
  }
  a { color:var(--cy); }
  .hidden { display:none !important; }
  .mono { font-family:ui-monospace,Menlo,Consolas,monospace; }
  .mut { color:var(--mut); }
  input,select,textarea,button { font:inherit; color:var(--fg); }
  .field { width:100%; padding:10px 12px; background:var(--panel2); border:1px solid var(--line); border-radius:10px; outline:none; transition:border-color .15s,box-shadow .15s; }
  .field:focus { border-color:var(--cy); box-shadow:0 0 0 3px var(--acc-soft); }
  select.field { appearance:none; cursor:pointer; }
  .btn { background:linear-gradient(135deg,var(--br),var(--vio)); color:#fff; border:none; padding:10px 16px; border-radius:10px; cursor:pointer; font-weight:500; letter-spacing:.3px; transition:transform .08s,opacity .15s; }
  .btn:hover { opacity:.92; } .btn:active { transform:translateY(1px); }
  .btn.sec { background:var(--hov); border:1px solid var(--line); color:var(--fg); }
  .btn.sm { padding:6px 11px; border-radius:8px; font-size:12.5px; }
  .btn.danger { background:linear-gradient(135deg,#e11d48,#fb7185); }
  .btn[disabled] { opacity:.5; cursor:not-allowed; }
  .err { color:var(--err); font-size:13px; min-height:18px; }
  .ok { color:var(--ok); }
  .chip { display:inline-flex; align-items:center; gap:5px; padding:2px 9px; border-radius:99px; font-size:11.5px; border:1px solid var(--line2); color:var(--mut); }
  .chip.on { color:var(--ok); border-color:rgba(52,211,153,.4); background:rgba(52,211,153,.10); }
  .chip.off { color:var(--mut); }
  .chip.warn { color:var(--warn); border-color:rgba(251,191,36,.4); background:rgba(251,191,36,.10); }
  .dot-s { width:7px; height:7px; border-radius:99px; background:var(--mut); display:inline-block; }
  .dot-s.on { background:var(--ok); box-shadow:0 0 8px rgba(52,211,153,.7); }

  /* ---- Login ---- */
  #login { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
  .login-card { width:380px; max-width:100%; padding:34px 30px; background:var(--panel); backdrop-filter:blur(14px);
    border:1px solid var(--line); border-radius:18px; box-shadow:var(--shadow); }
  .logo { display:flex; align-items:center; gap:11px; }
  .logo .dot { width:32px; height:32px; border-radius:9px; background:linear-gradient(135deg,var(--cy),var(--vio)); box-shadow:var(--glow); flex-shrink:0; }
  .logo h1 { font-size:18px; margin:0; letter-spacing:.5px; }
  .login-card .sub { color:var(--mut); font-size:13px; margin:8px 0 22px; }
  .seg { display:flex; gap:6px; background:var(--panel2); border:1px solid var(--line); border-radius:10px; padding:4px; margin-bottom:18px; }
  .seg button { flex:1; background:none; border:none; color:var(--mut); padding:8px; border-radius:7px; cursor:pointer; }
  .seg button.on { background:linear-gradient(135deg,rgba(59,130,246,.32),rgba(139,92,246,.32)); color:#fff; }
  label.lbl { display:block; font-size:12px; color:var(--mut); margin:0 0 6px; }
  .qrwrap { text-align:center; padding:8px 0 4px; }
  .qrwrap svg, .qrwrap img { background:#fff; padding:12px; border-radius:14px; width:200px; height:200px; }
  .qrwrap .tip { color:var(--mut); font-size:12px; margin-top:12px; }
  .qrstate { font-size:12px; margin-top:8px; color:var(--cy); }

  /* ---- App shell ---- */
  #app { display:flex; min-height:100vh; }
  aside { width:228px; flex-shrink:0; background:linear-gradient(180deg,var(--panel),var(--panel));
    border-right:1px solid var(--line); display:flex; flex-direction:column; padding:18px 14px; position:sticky; top:0; height:100vh; }
  aside .logo { padding:4px 8px 18px; }
  nav { display:flex; flex-direction:column; gap:4px; flex:1; overflow-y:auto; }
  nav button { display:flex; align-items:center; gap:11px; background:none; border:none; color:var(--mut); padding:10px 13px;
    border-radius:10px; cursor:pointer; text-align:left; font-size:14px; transition:background .15s,color .15s; }
  nav button:hover { color:var(--fg); background:var(--hov); }
  nav button.active { color:#fff; background:linear-gradient(135deg,rgba(59,130,246,.30),rgba(139,92,246,.24)); box-shadow:inset 0 0 0 1px var(--line2); }
  html[data-theme="light"] nav button.active { color:#fff; }
  nav button .ic { width:18px; text-align:center; opacity:.95; font-size:15px; }
  aside .foot { border-top:1px solid var(--line); padding-top:12px; }
  aside .ver { font-size:11.5px; color:var(--mut); padding:0 8px; display:flex; align-items:center; justify-content:center; gap:7px; }
  aside .ver b { color:var(--fg); font-weight:600; }

  .content { flex:1; min-width:0; display:flex; flex-direction:column; min-height:100vh; }
  .topbar { display:flex; align-items:center; gap:14px; padding:13px 22px; border-bottom:1px solid var(--line);
    background:var(--panel2); backdrop-filter:blur(8px); position:sticky; top:0; z-index:5; }
  .topbar h2 { margin:0; font-size:16px; font-weight:600; letter-spacing:.4px; }
  .topbar .sp { flex:1; }
  .iconbtn { width:34px; height:34px; border-radius:9px; border:1px solid var(--line); background:var(--hov); color:var(--fg);
    cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:16px; transition:border-color .15s,background .15s; }
  .iconbtn:hover { border-color:var(--line2); }
  .userbox { display:flex; align-items:center; gap:9px; padding:5px 6px 5px 12px; border:1px solid var(--line); border-radius:99px; background:var(--hov); }
  .userbox .av { width:24px; height:24px; border-radius:99px; background:linear-gradient(135deg,var(--cy),var(--vio)); display:flex; align-items:center; justify-content:center; font-size:12px; color:#fff; font-weight:600; }
  .userbox b { font-size:13px; font-weight:600; }
  main { padding:22px 24px; }
  main.fill { padding:0; overflow:hidden; flex:1 1 auto; min-height:0; display:flex; }

  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:14px; }
  .card { background:var(--panel); backdrop-filter:blur(10px); border:1px solid var(--line); border-radius:14px; padding:18px; }
  .card h3 { margin:0 0 10px; font-size:12px; color:var(--mut); font-weight:500; letter-spacing:.5px; text-transform:uppercase; }
  .card .big { font-size:27px; font-weight:650; background:linear-gradient(135deg,var(--fg),var(--br)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .card .sub { color:var(--mut); font-size:12px; margin-top:5px; }
  .bar { height:6px; border-radius:99px; background:var(--hov); margin-top:12px; overflow:hidden; }
  .bar > i { display:block; height:100%; border-radius:99px; background:linear-gradient(90deg,var(--cy),var(--vio)); transition:width .4s; }

  /* ---- Dashboard one-screen layout ---- */
  .dash { display:flex; flex-direction:column; gap:14px; flex:1 1 auto; min-height:0; width:100%; padding:18px 24px; box-sizing:border-box; }
  .dash .grid { flex:0 0 auto; }
  .dash .card { padding:15px 18px; }
  .dash .card .big { font-size:24px; }
  .dash .netwrap { flex:0 0 auto; }
  .dash .procwrap { flex:1 1 auto; min-height:0; display:flex; flex-direction:column; }
  .dash .procwrap .scroll { flex:1 1 auto; min-height:0; overflow-y:auto; }
  /* Network throughput: left/right split */
  .netsplit { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  @media (max-width:640px){ .netsplit { grid-template-columns:1fr; } }
  .netcell { position:relative; border-radius:12px; overflow:hidden; padding:14px 16px 0; background:var(--panel2); border:1px solid var(--line); }
  .netcell .lab { display:flex; align-items:center; gap:8px; font-size:12px; font-weight:600; }
  .netcell .val { font-size:26px; font-weight:700; margin-top:2px; font-variant-numeric:tabular-nums; }
  .netcell .val s { font-size:13px; color:var(--mut); font-weight:400; text-decoration:none; margin-left:3px; }
  .netcell .arrow { width:22px; height:22px; border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:13px; color:#fff; }
  .netcell .chart { margin:6px -16px 0; height:74px; }
  .netcell.rx .arrow { background:linear-gradient(135deg,#22d3ee,#3b82f6); }
  .netcell.tx .arrow { background:linear-gradient(135deg,#8b5cf6,#d946ef); }
  .netcell.rx .lab { color:var(--cy); }
  .netcell.tx .lab { color:var(--vio); }
  .sechead { display:flex; align-items:center; gap:10px; margin:22px 0 12px; }
  .sechead h3 { margin:0; font-size:14px; font-weight:600; } .sechead .sp { flex:1; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th,td { text-align:left; padding:9px 10px; border-bottom:1px solid var(--line); vertical-align:middle; }
  th { color:var(--mut); font-weight:500; font-size:12px; }
  tr:hover td { background:var(--hov); }
  th.num,td.num { text-align:right; font-variant-numeric:tabular-nums; }
  /* Fixed-layout process table: stable columns that don't reflow each refresh. */
  table.proctable { table-layout:fixed; }
  table.proctable col.c-pid { width:84px; }
  table.proctable col.c-cpu { width:84px; }
  table.proctable col.c-mem { width:104px; }
  table.proctable td.nm { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .actions { display:flex; gap:6px; flex-wrap:wrap; }
  .subtabs { display:flex; gap:4px; background:var(--panel2); border:1px solid var(--line); border-radius:10px; padding:4px; margin-bottom:16px; width:fit-content; }
  .subtabs button { background:none; border:none; color:var(--mut); padding:7px 15px; border-radius:7px; cursor:pointer; font-size:13px; }
  .subtabs button.on { background:var(--acc-soft); color:var(--fg); }
  pre.out { background:var(--panel2); border:1px solid var(--line); border-radius:10px; padding:13px; max-height:50vh; overflow:auto; white-space:pre-wrap; word-break:break-all; font-size:12.5px; }
  .warn { background:rgba(251,191,36,0.08); border:1px solid rgba(251,191,36,0.3); color:var(--warn); padding:11px 13px; border-radius:11px; font-size:12.5px; margin-bottom:16px; }
  .empty { color:var(--mut); text-align:center; padding:30px; font-size:13px; }
  .formgrid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .formgrid .full { grid-column:1 / -1; }
  @media (max-width:680px){ .formgrid{grid-template-columns:1fr;} }

  /* ---- Modal ---- */
  .mask { position:fixed; inset:0; background:rgba(4,7,13,0.62); backdrop-filter:blur(3px); z-index:50; display:flex; align-items:center; justify-content:center; padding:20px; }
  .modal { background:var(--panel-solid); border:1px solid var(--line2); border-radius:16px; box-shadow:var(--shadow); width:760px; max-width:100%; max-height:88vh; display:flex; flex-direction:column; overflow:hidden; }
  .modal.big { width:1000px; height:80vh; }
  .modal-h { display:flex; align-items:center; gap:12px; padding:15px 18px; border-bottom:1px solid var(--line); }
  .modal-h h3 { margin:0; font-size:15px; flex:1; }
  .modal-b { padding:18px; overflow:auto; flex:1; }
  .x { cursor:pointer; color:var(--mut); font-size:20px; line-height:1; background:none; border:none; }

  /* ---- Terminal ---- */
  .term-wrap { background:#05080f; border:1px solid var(--line2); border-radius:12px; overflow:hidden; display:flex; flex-direction:column; }
  .term-bar { display:flex; align-items:center; gap:10px; padding:8px 12px; background:rgba(255,255,255,0.03); border-bottom:1px solid var(--line); font-size:12px; color:var(--mut); }
  .term-bar .sp { flex:1; }
  .vterm { font-family:ui-monospace,Menlo,Consolas,monospace; font-size:13px; line-height:1.3; padding:10px 12px; color:#cfe3ff; background:#05080f;
    white-space:pre; overflow-y:auto; overflow-x:hidden; outline:none; cursor:text; flex:1; min-height:200px; }
  .vterm .cur { background:#cfe3ff; color:#05080f; }
  .vterm:focus { box-shadow:inset 0 0 0 1px rgba(34,211,238,0.4); }
  /* ---- File browser ---- */
  .fb-path { display:flex; align-items:center; gap:6px; flex-wrap:wrap; font-size:12.5px; margin-bottom:12px; }
  .fb-path .seg2 { cursor:pointer; color:var(--cy); }
  .fb-list { border:1px solid var(--line); border-radius:10px; overflow:hidden; }
  .fb-row { display:flex; align-items:center; gap:10px; padding:9px 12px; border-bottom:1px solid var(--line); cursor:default; }
  .fb-row:last-child { border-bottom:none; }
  .fb-row:hover { background:var(--hov); }
  .fb-row .nm { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .fb-row .nm.dir { color:var(--cy); cursor:pointer; }
  .fb-row .sz { color:var(--mut); font-size:12px; }
</style>
</head>
<body>

<!-- Login -->
<div id="login">
  <div class="login-card">
    <div class="logo"><span class="dot"></span><h1>TeaOps 本机管理</h1></div>
    <div class="sub">安全登录到本机控制台</div>
    <div class="seg">
      <button id="tabPw" class="on" onclick="loginMode('pw')">账号密码</button>
      <button id="tabWx" onclick="loginMode('wx')">微信扫码</button>
    </div>
    <div id="panewPw">
      <label class="lbl">账号</label>
      <input id="user" class="field" style="margin-bottom:12px" value="admin" autocomplete="username" />
      <label class="lbl">密码</label>
      <input id="pw" class="field" type="password" placeholder="访问密码" autocomplete="current-password" style="margin-bottom:16px" />
      <button class="btn" style="width:100%" onclick="doLogin()">登 录</button>
      <div class="err" id="loginErr" style="margin-top:10px"></div>
    </div>
    <div id="paneWx" class="hidden">
      <div class="qrwrap">
        <div id="qrbox"></div>
        <div class="tip">如您是服务器所有者，想要快捷登录，请在微信小程序「茶记本」中使用「扫一扫」确认登录</div>
        <div class="qrstate" id="qrstate"></div>
      </div>
    </div>
  </div>
</div>

<!-- App -->
<div id="app" class="hidden">
  <aside>
    <div class="logo"><span class="dot"></span><h1>TeaOps</h1></div>
    <nav id="nav"></nav>
    <div class="foot">
      <div class="ver">Agent <b id="agentVer">…</b></div>
    </div>
  </aside>
  <div class="content">
    <div class="topbar">
      <h2 id="title">监控</h2>
      <span class="sp"></span>
      <button class="iconbtn" id="themeBtn" title="主题：跟随系统" onclick="cycleTheme()">◑</button>
      <div class="userbox">
        <span class="av" id="userAv">A</span>
        <b id="whoName">admin</b>
        <button class="iconbtn" style="width:28px;height:28px;font-size:13px" title="退出登录" onclick="logout()">⏻</button>
      </div>
    </div>
    <main id="view"></main>
  </div>
</div>

<div id="modalRoot"></div>

<script>
// =========================================================================
// Core state + helpers
// =========================================================================
const S = { token: localStorage.getItem('teaops_web_token') || '', tab: 'dash', timer: null, ws: null, wxTimer: null };

function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }
function $(id) { return document.getElementById(id); }
function el(tag, attrs, html) { const e = document.createElement(tag); if (attrs) for (const k in attrs) e.setAttribute(k, attrs[k]); if (html != null) e.innerHTML = html; return e; }

function api(path, opts = {}) {
  opts.headers = Object.assign({ 'Content-Type': 'application/json' }, opts.headers || {});
  if (S.token) opts.headers['Authorization'] = 'Bearer ' + S.token;
  return fetch(path, opts).then(async (r) => {
    if (r.status === 401) { logout(); throw new Error('未授权'); }
    const txt = await r.text();
    let body; try { body = JSON.parse(txt); } catch (e) { body = txt; }
    if (!r.ok || (body && body.ok === false)) throw new Error((body && body.error) || body || ('HTTP ' + r.status));
    return body;
  });
}
// Capability op (docker/nginx/mysql): POST {op,...} → data.
function op(kind, obj) { return api('/api/' + kind, { method: 'POST', body: JSON.stringify(obj) }).then((b) => b.data); }

function fmtBytes(n) {
  n = Number(n) || 0; const u = ['B', 'KB', 'MB', 'GB', 'TB']; let i = 0;
  while (n >= 1024 && i < u.length - 1) { n /= 1024; i++; }
  return n.toFixed(i ? (n < 10 ? 2 : 1) : 0) + ' ' + u[i];
}
function toast(msg, kind) {
  const t = el('div', { style: 'position:fixed;left:50%;top:22px;transform:translateX(-50%);z-index:99;padding:10px 18px;border-radius:10px;font-size:13px;box-shadow:var(--shadow);background:var(--panel-solid);border:1px solid var(--line2);color:var(--fg)' });
  if (kind === 'err') t.style.borderColor = 'var(--err)';
  if (kind === 'ok') t.style.borderColor = 'var(--ok)';
  t.textContent = msg; document.body.appendChild(t);
  setTimeout(() => { t.style.transition = 'opacity .3s'; t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 2200);
}
function confirmDanger(msg) { return new Promise((res) => { modal('请确认', `<p style="margin:0 0 18px">${esc(msg)}</p><div class="row" style="justify-content:flex-end"><button class="btn sec" id="cdNo">取消</button><button class="btn danger" id="cdYes">确定</button></div>`, (close) => { $('cdNo').onclick = () => { close(); res(false); }; $('cdYes').onclick = () => { close(); res(true); }; }); }); }

// ---- Modal ----
function modal(title, bodyHtml, onMount, big) {
  const root = $('modalRoot');
  const mask = el('div', { class: 'mask' });
  mask.innerHTML = `<div class="modal ${big ? 'big' : ''}"><div class="modal-h"><h3>${esc(title)}</h3><button class="x">&times;</button></div><div class="modal-b">${bodyHtml}</div></div>`;
  root.appendChild(mask);
  const close = () => { mask.remove(); };
  mask.querySelector('.x').onclick = close;
  mask.addEventListener('mousedown', (e) => { if (e.target === mask) close(); });
  if (onMount) onMount(close, mask);
  return close;
}

// =========================================================================
// Theme: auto (follow OS) | light | dark — single icon cycles the 3 states.
// =========================================================================
const THEME_ICONS = { auto: '◑', light: '☀', dark: '☾' };
const THEME_LABELS = { auto: '跟随系统', light: '浅色', dark: '深色' };
function applyTheme() {
  const m = localStorage.getItem('teaops_theme') || 'auto';
  let eff = m;
  if (m === 'auto') eff = (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', eff);
  document.documentElement.setAttribute('data-mode', m);
  const btn = $('themeBtn');
  if (btn) { btn.textContent = THEME_ICONS[m]; btn.title = '主题：' + THEME_LABELS[m]; }
}
function cycleTheme() {
  const order = ['auto', 'light', 'dark'];
  const m = localStorage.getItem('teaops_theme') || 'auto';
  const next = order[(order.indexOf(m) + 1) % order.length];
  localStorage.setItem('teaops_theme', next);
  applyTheme();
}
if (window.matchMedia) {
  const mq = window.matchMedia('(prefers-color-scheme: light)');
  (mq.addEventListener ? mq.addEventListener.bind(mq, 'change') : mq.addListener.bind(mq))(() => {
    if ((localStorage.getItem('teaops_theme') || 'auto') === 'auto') applyTheme();
  });
}
applyTheme();

// =========================================================================
// Login
// =========================================================================
function loginMode(m) {
  $('tabPw').classList.toggle('on', m === 'pw');
  $('tabWx').classList.toggle('on', m === 'wx');
  $('panewPw').classList.toggle('hidden', m !== 'pw');
  $('paneWx').classList.toggle('hidden', m === 'pw');
  if (m === 'wx') startWxLogin(); else stopWxLogin();
}
function doLogin() {
  const username = $('user').value.trim();
  const password = $('pw').value;
  $('loginErr').textContent = '';
  fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) })
    .then(async (r) => { const b = await r.json().catch(() => ({})); if (!r.ok) throw new Error(b.error || '登录失败'); return b; })
    .then((b) => { S.token = b.token; localStorage.setItem('teaops_web_token', S.token); showApp(); })
    .catch((e) => { $('loginErr').textContent = e.message; });
}
function startWxLogin() {
  stopWxLogin();
  $('qrstate').textContent = '正在生成二维码…';
  $('qrbox').innerHTML = '';
  fetch('/api/wx/login/start', { method: 'POST' })
    .then(async (r) => { const b = await r.json().catch(() => ({})); if (!r.ok || b.ok === false) throw new Error(b.error || '无法发起'); return b; })
    .then((b) => {
      $('qrbox').innerHTML = b.svg || '';
      $('qrstate').textContent = '请在微信小程序「茶记本」中使用「扫一扫」确认登录';
      pollWx(b.ticket);
    })
    .catch((e) => { $('qrstate').textContent = e.message; });
}
function pollWx(ticket) {
  S.wxTimer = setInterval(() => {
    fetch('/api/wx/login/poll?ticket=' + encodeURIComponent(ticket))
      .then((r) => r.json()).then((b) => {
        if (b.status === 'confirmed' && b.token) { stopWxLogin(); S.token = b.token; localStorage.setItem('teaops_web_token', S.token); showApp(); }
        else if (b.status === 'expired') { $('qrstate').textContent = '二维码已过期，正在刷新…'; startWxLogin(); }
      }).catch(() => {});
  }, 1500);
}
function stopWxLogin() { if (S.wxTimer) { clearInterval(S.wxTimer); S.wxTimer = null; } }

function logout() {
  if (S.token) api('/api/logout', { method: 'POST' }).catch(() => {});
  S.token = ''; localStorage.removeItem('teaops_web_token');
  stopTab();
  $('app').classList.add('hidden');
  $('login').classList.remove('hidden');
}

const FOLDER_SVG = '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" style="vertical-align:-3px"><path d="M3 6.5C3 5.7 3.7 5 4.5 5H9l2 2h8.5c.8 0 1.5.7 1.5 1.5v9c0 .8-.7 1.5-1.5 1.5h-15C3.7 19 3 18.3 3 17.5v-11Z"/></svg>';
const TABS = [
  { key: 'dash', label: '监控', ic: '◉' },
  { key: 'term', label: '终端', ic: '▤' },
  { key: 'docker', label: 'Docker', ic: '⬢' },
  { key: 'nginx', label: 'Nginx', ic: '⬡' },
  { key: 'mysql', label: 'MySQL', ic: '⛁' },
  { key: 'files', label: '文件', ic: FOLDER_SVG },
  { key: 'settings', label: '设置', ic: '⚙' },
];

function showApp() {
  $('login').classList.add('hidden');
  $('app').classList.remove('hidden');
  const nav = $('nav'); nav.innerHTML = '';
  TABS.forEach((t) => {
    const b = el('button', { 'data-k': t.key });
    b.className = S.tab === t.key ? 'active' : '';
    b.innerHTML = `<span class="ic">${t.ic}</span><span class="t">${t.label}</span>`;
    b.onclick = () => switchTab(t.key);
    nav.appendChild(b);
  });
  api('/api/info').then((b) => {
    $('agentVer').textContent = 'v' + (b.data.version || '?');
    if (b.data.hostname) $('agentVer').title = b.data.hostname;
  }).catch(() => {});
  api('/api/settings').then((b) => { setUser(b.data.username || 'admin'); }).catch(() => {});
  switchTab(S.tab);
}
function setUser(name) { $('whoName').textContent = name; $('userAv').textContent = (name[0] || 'A').toUpperCase(); }

function stopTab() {
  if (S.timer) { clearInterval(S.timer); S.timer = null; }
  if (S.ws) { try { S.ws.close(); } catch (e) {} S.ws = null; }
  if (window._termCleanup) { try { window._termCleanup(); } catch (e) {} window._termCleanup = null; }
  if (window._modalTermCleanup) { try { window._modalTermCleanup(); } catch (e) {} window._modalTermCleanup = null; }
  // Close any open modal (and its live sockets) when leaving a tab.
  const root = $('modalRoot'); if (root) root.innerHTML = '';
}

function switchTab(k) {
  S.tab = k;
  stopTab();
  document.querySelectorAll('#nav button').forEach((b) => b.className = b.dataset.k === k ? 'active' : '');
  $('title').textContent = (TABS.find((t) => t.key === k) || {}).label || '';
  const v = $('view'); v.innerHTML = '';
  // The dashboard is a fixed one-screen layout (no body scroll); other tabs
  // scroll normally.
  v.classList.toggle('fill', k === 'dash');
  if (k === 'dash') renderDash(v);
  else if (k === 'term') renderTerm(v);
  else if (k === 'docker') renderDocker(v);
  else if (k === 'nginx') renderNginx(v);
  else if (k === 'mysql') renderMysql(v);
  else if (k === 'files') renderFiles(v);
  else if (k === 'settings') renderSettings(v);
}

// =========================================================================
// Dashboard — one screen: stat cards + split network throughput + proc table
// =========================================================================
function renderDash(v) {
  v.innerHTML = `
    <div class="dash">
      <div class="grid" id="cards"></div>
      <div class="card netwrap"><h3>网络吞吐</h3><div class="netsplit" id="netcard"></div></div>
      <div class="card procwrap"><h3>进程 · CPU Top</h3><div class="scroll" id="procs"><div class="mut">加载中…</div></div></div>
    </div>`;
  const hist = { rx: [], tx: [] };
  const refresh = () => {
    api('/api/metrics').then((b) => {
      const m = b.data;
      $('cards').innerHTML = [
        card('CPU', (m.cpu_usage || 0).toFixed(1) + '%', (m.cpu_cores || 0) + ' 核心', m.cpu_usage),
        card('内存', (m.memory_usage || 0).toFixed(1) + '%', fmtBytes(m.mem_used) + ' / ' + fmtBytes(m.mem_total), m.memory_usage),
        card('磁盘', (m.disk_usage || 0).toFixed(1) + '%', fmtBytes(m.disk_used) + ' / ' + fmtBytes(m.disk_total), m.disk_usage),
      ].join('');
      hist.rx.push(m.net_rx || 0); hist.tx.push(m.net_tx || 0);
      if (hist.rx.length > 48) { hist.rx.shift(); hist.tx.shift(); }
      $('netcard').innerHTML = netCard(m.net_rx || 0, m.net_tx || 0, hist);
    }).catch(() => {});
    api('/api/procs').then((b) => {
      const rows = (b.data.by_cpu || []).slice(0, 20);
      let h = '<table class="proctable"><colgroup><col class="c-name"/><col class="c-pid"/><col class="c-cpu"/><col class="c-mem"/></colgroup><tr><th>进程</th><th class="num">PID</th><th class="num">CPU</th><th class="num">内存</th></tr>';
      rows.forEach((p) => { h += `<tr><td class="mono nm" title="${esc(p.name)}">${esc(p.name)}</td><td class="num">${p.pid}</td><td class="num">${(p.cpu || 0).toFixed(1)}%</td><td class="num">${fmtBytes(p.mem)}</td></tr>`; });
      $('procs').innerHTML = h + '</table>';
    }).catch(() => {});
  };
  refresh(); S.timer = setInterval(refresh, 2000);
}
function card(title, big, sub, pct) {
  const bar = pct == null ? '' : `<div class="bar"><i style="width:${Math.min(100, Math.max(0, pct)).toFixed(0)}%"></i></div>`;
  return `<div class="card"><h3>${title}</h3><div class="big">${big}</div><div class="sub">${sub}</div>${bar}</div>`;
}
// Network throughput: two cells (left=下行, right=上行), each a polished area
// chart with its own gradient + glow, normalized to its own recent peak.
function netCard(rx, tx, hist) {
  return `
    <div class="netcell rx">
      <div class="lab"><span class="arrow">↓</span> 下行</div>
      <div class="val">${fmtBytes(rx)}<s>/s</s></div>
      <div class="chart">${areaChart(hist.rx, 'rx')}</div>
    </div>
    <div class="netcell tx">
      <div class="lab"><span class="arrow">↑</span> 上行</div>
      <div class="val">${fmtBytes(tx)}<s>/s</s></div>
      <div class="chart">${areaChart(hist.tx, 'tx')}</div>
    </div>`;
}
// A smooth, filled area chart (single series) with a gradient fill, a soft
// glow on the stroke, and a highlighted leading dot. `kind` picks the palette.
function areaChart(data, kind) {
  const W = 300, H = 74, pad = 4;
  const n = data.length;
  if (n < 2) return '<div style="height:74px;display:flex;align-items:center;justify-content:center;color:var(--mut);font-size:12px">采集中…</div>';
  const max = Math.max(1, ...data);
  const stroke = kind === 'rx' ? '#22d3ee' : '#a855f7';
  const gid = 'g_' + kind, glow = 'gl_' + kind;
  const xs = (i) => (i * (W / (n - 1)));
  const ys = (val) => (H - pad - (val / max) * (H - pad * 2 - 2));
  // Smooth path via Catmull-Rom → cubic Bézier for a clean curve (no jitter).
  const pts = data.map((val, i) => [xs(i), ys(val)]);
  let d = `M${pts[0][0].toFixed(1)},${pts[0][1].toFixed(1)}`;
  for (let i = 0; i < pts.length - 1; i++) {
    const p0 = pts[i - 1] || pts[i], p1 = pts[i], p2 = pts[i + 1], p3 = pts[i + 2] || p2;
    const c1x = p1[0] + (p2[0] - p0[0]) / 6, c1y = p1[1] + (p2[1] - p0[1]) / 6;
    const c2x = p2[0] - (p3[0] - p1[0]) / 6, c2y = p2[1] - (p3[1] - p1[1]) / 6;
    d += ` C${c1x.toFixed(1)},${c1y.toFixed(1)} ${c2x.toFixed(1)},${c2y.toFixed(1)} ${p2[0].toFixed(1)},${p2[1].toFixed(1)}`;
  }
  const area = `${d} L${W},${H} L0,${H} Z`;
  const last = pts[pts.length - 1];
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="74" preserveAspectRatio="none">
    <defs>
      <linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="${stroke}" stop-opacity="0.42"/>
        <stop offset="1" stop-color="${stroke}" stop-opacity="0.02"/>
      </linearGradient>
      <filter id="${glow}" x="-20%" y="-40%" width="140%" height="180%">
        <feGaussianBlur stdDeviation="2.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <path d="${area}" fill="url(#${gid})"/>
    <path d="${d}" fill="none" stroke="${stroke}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" filter="url(#${glow})"/>
    <circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="2.6" fill="${stroke}"/>
  </svg>`;
}

// =========================================================================
// VTerm — a compact VT100/ANSI terminal emulator that renders to a focusable
// <div>. Click the screen to type directly (no separate input box). Handles
// backspace/erase, cursor movement, colors (SGR), scroll region, and the
// alt-screen so full-screen apps (top/vim) behave. Encodes keystrokes to the
// proper byte sequences and sends them via the supplied `send(str)`.
// =========================================================================
function VTerm(host, send) {
  const COLORS = ['#1c2533', '#fb7185', '#34d399', '#fbbf24', '#60a5fa', '#c084fc', '#22d3ee', '#dbe6f5',
                  '#5b6b86', '#fda4af', '#6ee7b7', '#fde68a', '#93c5fd', '#d8b4fe', '#67e8f9', '#ffffff'];
  const DEF_FG = 7, DEF_BG = -1;
  let cols = 80, rows = 24;
  const blank = () => ({ ch: ' ', fg: DEF_FG, bg: DEF_BG, bold: false, inv: false });
  let grid, alt = null, cx = 0, cy = 0, sgr = { fg: DEF_FG, bg: DEF_BG, bold: false, inv: false };
  let top = 0, bot = rows - 1, curVisible = true;
  let saved = null;

  function makeGrid() { const g = []; for (let r = 0; r < rows; r++) { const row = []; for (let c = 0; c < cols; c++) row.push(blank()); g.push(row); } return g; }
  grid = makeGrid();

  function resizeTo(nc, nr) {
    nc = Math.max(8, Math.min(400, nc)); nr = Math.max(4, Math.min(200, nr));
    if (nc === cols && nr === rows) return;
    cols = nc; rows = nr; top = 0; bot = rows - 1;
    grid = makeGrid(); if (alt) alt = makeGrid();
    cx = Math.min(cx, cols - 1); cy = Math.min(cy, rows - 1);
    send(JSON.stringify({ type: 'resize', cols, rows }));
    schedule();
  }

  function scrollUp(n) { for (let k = 0; k < n; k++) { grid.splice(top, 1); const row = []; for (let c = 0; c < cols; c++) row.push(blank()); grid.splice(bot, 0, row); } }
  function lineFeed() { if (cy === bot) scrollUp(1); else cy = Math.min(rows - 1, cy + 1); }
  function putChar(ch) {
    if (cx >= cols) { cx = 0; lineFeed(); }
    const cell = grid[cy][cx];
    cell.ch = ch; cell.fg = sgr.fg; cell.bg = sgr.bg; cell.bold = sgr.bold; cell.inv = sgr.inv;
    cx++;
  }
  function eraseInLine(mode) {
    const row = grid[cy];
    if (mode === 0) for (let c = cx; c < cols; c++) row[c] = blank();
    else if (mode === 1) for (let c = 0; c <= cx && c < cols; c++) row[c] = blank();
    else for (let c = 0; c < cols; c++) row[c] = blank();
  }
  function eraseInDisplay(mode) {
    if (mode === 2 || mode === 3) { grid = makeGrid(); cx = 0; cy = 0; return; }
    if (mode === 0) { eraseInLine(0); for (let r = cy + 1; r < rows; r++) grid[r] = grid[r].map(blank); }
    else if (mode === 1) { for (let r = 0; r < cy; r++) grid[r] = grid[r].map(blank); eraseInLine(1); }
  }
  function applySGR(params) {
    if (params.length === 0) params = [0];
    for (let i = 0; i < params.length; i++) {
      const p = params[i];
      if (p === 0) { sgr = { fg: DEF_FG, bg: DEF_BG, bold: false, inv: false }; }
      else if (p === 1) sgr.bold = true;
      else if (p === 22) sgr.bold = false;
      else if (p === 7) sgr.inv = true;
      else if (p === 27) sgr.inv = false;
      else if (p >= 30 && p <= 37) sgr.fg = p - 30;
      else if (p === 39) sgr.fg = DEF_FG;
      else if (p >= 40 && p <= 47) sgr.bg = p - 40;
      else if (p === 49) sgr.bg = DEF_BG;
      else if (p >= 90 && p <= 97) sgr.fg = p - 90 + 8;
      else if (p >= 100 && p <= 107) sgr.bg = p - 100 + 8;
      else if (p === 38 || p === 48) {
        // 256/truecolor — collapse to nearest basic for our 16-color palette.
        const target = p === 38 ? 'fg' : 'bg';
        if (params[i + 1] === 5) { const idx = params[i + 2] || 0; sgr[target] = idx < 16 ? idx : DEF_FG; i += 2; }
        else if (params[i + 1] === 2) { sgr[target] = DEF_FG; i += 4; }
      }
    }
  }

  // ---- ANSI parser state machine ----
  let st = 'gnd', buf = '', oscBuf = '';
  function feed(bytes) {
    for (let i = 0; i < bytes.length; i++) {
      const ch = bytes[i], code = ch.charCodeAt(0);
      if (st === 'gnd') {
        if (code === 0x1b) { st = 'esc'; }
        else if (ch === '\r') cx = 0;
        else if (ch === '\n') lineFeed();
        else if (ch === '\b') { cx = Math.max(0, cx - 1); }
        else if (ch === '\t') { cx = Math.min(cols - 1, (Math.floor(cx / 8) + 1) * 8); }
        else if (code === 7) { /* bell */ }
        else if (code >= 32) putChar(ch);
      } else if (st === 'esc') {
        if (ch === '[') { buf = ''; st = 'csi'; }
        else if (ch === ']') { oscBuf = ''; st = 'osc'; }
        else if (ch === '(' || ch === ')') { st = 'charset'; }
        else if (ch === '=' || ch === '>') { st = 'gnd'; }
        else if (ch === 'M') { if (cy === top) { grid.splice(bot, 1); const row = []; for (let c = 0; c < cols; c++) row.push(blank()); grid.splice(top, 0, row); } else cy = Math.max(0, cy - 1); st = 'gnd'; }
        else if (ch === '7') { saved = { cx, cy, sgr: Object.assign({}, sgr) }; st = 'gnd'; }
        else if (ch === '8') { if (saved) { cx = saved.cx; cy = saved.cy; sgr = Object.assign({}, saved.sgr); } st = 'gnd'; }
        else st = 'gnd';
      } else if (st === 'charset') { st = 'gnd'; }
      else if (st === 'csi') {
        if ((code >= 0x40 && code <= 0x7e)) { handleCSI(ch, buf); st = 'gnd'; }
        else buf += ch;
      } else if (st === 'osc') {
        if (code === 7) { st = 'gnd'; }
        else if (code === 0x1b) { st = 'oscEsc'; }
        else oscBuf += ch;
      } else if (st === 'oscEsc') { st = 'gnd'; }
    }
    schedule();
  }

  function handleCSI(final, raw) {
    let priv = '';
    if (raw[0] === '?' || raw[0] === '>') { priv = raw[0]; raw = raw.slice(1); }
    const params = raw.split(';').map((x) => (x === '' ? 0 : parseInt(x, 10)));
    const p0 = params[0] || 0;
    switch (final) {
      case 'A': cy = Math.max(top, cy - Math.max(1, p0)); break;
      case 'B': cy = Math.min(bot, cy + Math.max(1, p0)); break;
      case 'C': cx = Math.min(cols - 1, cx + Math.max(1, p0)); break;
      case 'D': cx = Math.max(0, cx - Math.max(1, p0)); break;
      case 'E': cx = 0; cy = Math.min(bot, cy + Math.max(1, p0)); break;
      case 'F': cx = 0; cy = Math.max(top, cy - Math.max(1, p0)); break;
      case 'G': cx = Math.min(cols - 1, Math.max(0, (p0 || 1) - 1)); break;
      case 'H': case 'f': cy = Math.min(rows - 1, Math.max(0, (params[0] || 1) - 1)); cx = Math.min(cols - 1, Math.max(0, (params[1] || 1) - 1)); break;
      case 'J': eraseInDisplay(p0); break;
      case 'K': eraseInLine(p0); break;
      case 'L': { const n = Math.max(1, p0); for (let k = 0; k < n; k++) { grid.splice(bot, 1); const row = []; for (let c = 0; c < cols; c++) row.push(blank()); grid.splice(cy, 0, row); } break; }
      case 'M': { const n = Math.max(1, p0); for (let k = 0; k < n; k++) { grid.splice(cy, 1); const row = []; for (let c = 0; c < cols; c++) row.push(blank()); grid.splice(bot, 0, row); } break; }
      case 'P': { const n = Math.max(1, p0); const row = grid[cy]; row.splice(cx, n); while (row.length < cols) row.push(blank()); break; }
      case '@': { const n = Math.max(1, p0); const row = grid[cy]; for (let k = 0; k < n; k++) row.splice(cx, 0, blank()); row.length = cols; break; }
      case 'X': { const n = Math.max(1, p0); for (let c = cx; c < cx + n && c < cols; c++) grid[cy][c] = blank(); break; }
      case 'd': cy = Math.min(rows - 1, Math.max(0, (p0 || 1) - 1)); break;
      case 'm': applySGR(params); break;
      case 'r': top = Math.max(0, (params[0] || 1) - 1); bot = Math.min(rows - 1, (params[1] || rows) - 1); cx = 0; cy = top; break;
      case 'h': case 'l': handleMode(priv, params, final === 'h'); break;
      case 's': saved = { cx, cy, sgr: Object.assign({}, sgr) }; break;
      case 'u': if (saved) { cx = saved.cx; cy = saved.cy; sgr = Object.assign({}, saved.sgr); } break;
      default: break;
    }
  }
  function handleMode(priv, params, set) {
    if (priv !== '?') return;
    for (const p of params) {
      if (p === 25) curVisible = set;
      else if (p === 1049 || p === 1047 || p === 47) {
        if (set && !alt) { alt = grid; grid = makeGrid(); saved = { cx, cy, sgr: Object.assign({}, sgr) }; cx = 0; cy = 0; }
        else if (!set && alt) { grid = alt; alt = null; if (saved) { cx = saved.cx; cy = saved.cy; sgr = Object.assign({}, saved.sgr); } }
      }
    }
  }

  // ---- Render (rAF-batched) ----
  let raf = 0;
  function schedule() { if (!raf) raf = requestAnimationFrame(render); }
  function render() {
    raf = 0;
    let html = '';
    for (let r = 0; r < rows; r++) {
      const row = grid[r];
      let line = '', curStyle = null, span = '';
      const flush = () => { if (span) { line += `<span style="${curStyle}">${span}</span>`; span = ''; } };
      for (let c = 0; c < cols; c++) {
        const cell = row[c];
        const isCur = curVisible && r === cy && c === cx;
        let fg = cell.fg < 0 ? DEF_FG : cell.fg, bg = cell.bg;
        if (cell.inv) { const t = fg; fg = bg < 0 ? DEF_BG : bg; bg = t < 0 ? DEF_FG : t; }
        let style = `color:${isCur ? '#05080f' : (COLORS[fg] || COLORS[DEF_FG])}`;
        const bgc = isCur ? '#cfe3ff' : (bg >= 0 ? COLORS[bg] : '');
        if (bgc) style += `;background:${bgc}`;
        if (cell.bold) style += ';font-weight:700';
        if (style !== curStyle) { flush(); curStyle = style; }
        span += cell.ch === ' ' ? '\u00a0' : esc(cell.ch);
      }
      flush();
      html += line + '\n';
    }
    host.innerHTML = html;
  }

  // ---- Input ----
  function keyToBytes(e) {
    const k = e.key;
    if (e.altKey && k.length === 1) return '\x1b' + k;
    if (e.ctrlKey && k.length === 1) {
      const u = k.toUpperCase();
      if (u >= 'A' && u <= 'Z') return String.fromCharCode(u.charCodeAt(0) - 64);
      if (k === ' ') return '\x00';
    }
    switch (k) {
      case 'Enter': return '\r';
      case 'Backspace': return '\x7f';
      case 'Tab': return '\t';
      case 'Escape': return '\x1b';
      case 'ArrowUp': return '\x1b[A'; case 'ArrowDown': return '\x1b[B';
      case 'ArrowRight': return '\x1b[C'; case 'ArrowLeft': return '\x1b[D';
      case 'Home': return '\x1b[H'; case 'End': return '\x1b[F';
      case 'PageUp': return '\x1b[5~'; case 'PageDown': return '\x1b[6~';
      case 'Insert': return '\x1b[2~'; case 'Delete': return '\x1b[3~';
      default: return k.length === 1 ? k : '';
    }
  }
  const onKey = (e) => {
    if (e.metaKey && (e.key === 'c' || e.key === 'v')) return; // allow copy/paste
    const bytes = keyToBytes(e);
    if (bytes !== '') { e.preventDefault(); send(JSON.stringify({ type: 'data', data: bytes })); }
  };
  const onPaste = (e) => { e.preventDefault(); const t = (e.clipboardData || window.clipboardData).getData('text'); if (t) send(JSON.stringify({ type: 'data', data: t })); };
  host.setAttribute('tabindex', '0');
  host.addEventListener('keydown', onKey);
  host.addEventListener('paste', onPaste);

  // Measure char cell to fit cols/rows to the element.
  function fit() {
    const probe = el('span', { style: 'visibility:hidden;position:absolute;white-space:pre' }, 'M'.repeat(10));
    host.appendChild(probe);
    const cw = probe.getBoundingClientRect().width / 10 || 8;
    probe.remove();
    const styles = getComputedStyle(host);
    const lh = parseFloat(styles.lineHeight) || 17;
    const padX = parseFloat(styles.paddingLeft) + parseFloat(styles.paddingRight);
    const padY = parseFloat(styles.paddingTop) + parseFloat(styles.paddingBottom);
    const nc = Math.floor((host.clientWidth - padX) / cw);
    const nr = Math.floor((host.clientHeight - padY) / lh);
    if (nc > 0 && nr > 0) resizeTo(nc, nr);
  }

  render();
  return {
    feed,
    fit,
    focus: () => host.focus(),
    dispose: () => { host.removeEventListener('keydown', onKey); host.removeEventListener('paste', onPaste); if (raf) cancelAnimationFrame(raf); },
  };
}

// Terminal tab (host shell) + reusable terminal launcher
// =========================================================================
function renderTerm(v) {
  v.innerHTML = `<div class="term-wrap" style="height:64vh"><div class="term-bar"><span class="dot-s on" id="tStatus"></span><span id="tLabel">主机终端</span><span class="sp"></span><span class="mut">点击下方区域即可输入</span></div><div class="vterm" id="vterm"></div></div>`;
  mountTerminal($('vterm'), $('tStatus'), `/api/terminal?token=${encodeURIComponent(S.token)}`);
}
// Open a terminal in the given host element against a WS path; returns cleanup.
function mountTerminal(hostEl, statusDot, wsPath) {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws = new WebSocket(`${proto}://${location.host}${wsPath}`);
  ws.binaryType = 'arraybuffer';
  const dec = new TextDecoder();
  const term = VTerm(hostEl, (s) => { if (ws.readyState === 1) ws.send(s); });
  ws.onopen = () => { if (statusDot) statusDot.className = 'dot-s on'; setTimeout(() => { term.fit(); term.focus(); }, 30); };
  ws.onmessage = (e) => { term.feed(typeof e.data === 'string' ? e.data : dec.decode(e.data, { stream: true })); };
  ws.onclose = () => { if (statusDot) statusDot.className = 'dot-s'; term.feed('\r\n\x1b[90m[连接已关闭]\x1b[0m\r\n'); };
  ws.onerror = () => { if (statusDot) statusDot.className = 'dot-s'; };
  hostEl.addEventListener('click', () => term.focus());
  const onResize = () => term.fit();
  window.addEventListener('resize', onResize);
  const cleanup = () => { window.removeEventListener('resize', onResize); term.dispose(); try { ws.close(); } catch (e) {} };
  window._termCleanup = cleanup;
  return cleanup;
}
// Open a terminal inside a modal (used by Docker container exec).
function openTerminalModal(title, wsPath) {
  let cleanup = null;
  modal(title, `<div class="term-wrap" style="height:62vh"><div class="term-bar"><span class="dot-s" id="mtStatus"></span><span>${esc(title)}</span><span class="sp"></span><span class="mut">点击区域输入</span></div><div class="vterm" id="mvterm"></div></div>`, (close, mask) => {
    cleanup = mountTerminal(mask.querySelector('#mvterm'), mask.querySelector('#mtStatus'), wsPath);
    // Replace global cleanup hook with modal-local so tab switches don't kill it twice.
    window._termCleanup = null;
    window._modalTermCleanup = cleanup;
    mask.querySelector('.x').addEventListener('click', () => { cleanup && cleanup(); window._modalTermCleanup = null; });
    mask.addEventListener('mousedown', (e) => { if (e.target === mask && cleanup) { cleanup(); window._modalTermCleanup = null; } });
  }, true);
}

// Poll a detached op (docker/nginx/mysql) into a <pre>; calls onDone on success.
function watchOp(kind, opId, outEl, onDone) {
  if (!opId) { if (onDone) onDone(); return; }
  const tick = () => op(kind, { op: 'op_log', op_id: opId }).then((d) => {
    outEl.textContent = (d.lines || []).join('\n');
    outEl.scrollTop = outEl.scrollHeight;
    if (d.status === 'done') { op(kind, { op: 'dismiss_op', op_id: opId }).catch(() => {}); if (onDone) onDone(); }
    else if (d.status === 'error') { outEl.textContent += '\n错误：' + (d.error || '失败'); op(kind, { op: 'dismiss_op', op_id: opId }).catch(() => {}); }
    else if (d.status === 'gone') { /* stop */ }
    else setTimeout(tick, 1000);
  }).catch(() => setTimeout(tick, 1500));
  tick();
}

// Render an interactive file browser into `mount`. container=null → host.
function fileBrowser(mount, container, startPath) {
  let path = startPath || '/';
  mount.innerHTML = `
    <div class="row" style="margin-bottom:12px">
      <div class="fb-path" id="fbPath" style="flex:1"></div>
      <button class="btn sm sec" id="fbMkdir">新建目录</button>
      <label class="btn sm" style="position:relative;overflow:hidden">上传<input type="file" id="fbUp" style="position:absolute;inset:0;opacity:0;cursor:pointer" /></label>
      <button class="btn sm sec" id="fbRef">刷新</button>
    </div>
    <div class="fb-list" id="fbList"><div class="empty">加载中…</div></div>`;
  const scope = () => (container ? { container } : {});
  const renderPath = () => {
    const parts = path.split('/').filter(Boolean);
    let acc = '', h = `<span class="seg2" data-p="/">/</span>`;
    parts.forEach((seg) => { acc += '/' + seg; h += `<span class="seg2" data-p="${esc(acc)}">${esc(seg)}</span><span class="mut">/</span>`; });
    $('fbPath').innerHTML = h;
    document.querySelectorAll('#fbPath .seg2').forEach((s) => s.onclick = () => { path = s.dataset.p; load(); });
  };
  const load = () => {
    renderPath();
    api('/api/files/list', { method: 'POST', body: JSON.stringify(Object.assign({ path }, scope())) }).then((b) => {
      const entries = b.data.entries || []; path = b.data.path || path; renderPath();
      const list = $('fbList'); list.innerHTML = '';
      if (path !== '/') { const up = el('div', { class: 'fb-row' }, `<span>↩</span><span class="nm dir">..</span>`); up.querySelector('.nm').onclick = () => { path = path.replace(/\/[^/]+\/?$/, '') || '/'; load(); }; list.appendChild(up); }
      if (!entries.length && path === '/') { /* keep up row only */ }
      entries.forEach((e) => {
        const row = el('div', { class: 'fb-row' });
        const full = (path === '/' ? '' : path) + '/' + e.name;
        row.innerHTML = `<span style="width:18px">${e.is_dir ? '📁' : '📄'}</span><span class="nm ${e.is_dir ? 'dir' : ''}">${esc(e.name)}</span><span class="sz">${e.is_dir ? '' : fmtBytes(e.size)}</span>`;
        const acts = el('div', { class: 'actions', style: 'margin-left:10px' });
        if (e.is_dir) { row.querySelector('.nm').onclick = () => { path = full; load(); }; }
        else { const dl = el('button', { class: 'btn sm sec' }, '下载'); dl.onclick = () => downloadFile(full, container); acts.appendChild(dl); }
        const del = el('button', { class: 'btn sm danger' }, '删除'); del.onclick = async () => { if (await confirmDanger(`删除 ${e.name}？`)) api('/api/files/delete', { method: 'POST', body: JSON.stringify(Object.assign({ path: full }, scope())) }).then(() => { toast('已删除', 'ok'); load(); }).catch((er) => toast(er.message, 'err')); };
        acts.appendChild(del); row.appendChild(acts); list.appendChild(row);

function kindLabel(k) { return { proxy_host: '反代主机', proxy_container: '反代容器', static: '静态站点' }[k] || k; }

function ngAddSite(reload) {
  modal('添加站点', `
    <div class="formgrid">
      <div class="full"><label class="lbl">域名（server_name）</label><input id="nsName" class="field" placeholder="example.com" /></div>

      <div class="full" id="nsKindFields"></div>
      <div class="full"><label style="display:flex;gap:7px;align-items:center"><input type="checkbox" id="nsSsl" /> 启用 HTTPS</label></div>
      <div class="full hidden" id="nsCertWrap"><label class="lbl">证书方式</label><select id="nsCert" class="field"><option value="le">Let's Encrypt 自动签发</option><option value="self">自签名</option><option value="manual">手动粘贴</option></select></div>
      <div class="full hidden" id="nsManual"><label class="lbl">证书 PEM</label><textarea id="nsCertPem" class="field" rows="3"></textarea><label class="lbl" style="margin-top:8px">私钥 PEM</label><textarea id="nsKeyPem" class="field" rows="3"></textarea></div>
    </div>

        : k === 'proxy_container'
        ? '<div class="formgrid"><div><label class="lbl">容器名</label><input id="nsCtn" class="field" placeholder="teaops-webapp" /></div><div><label class="lbl">容器端口</label><input id="nsCtnPort" class="field" type="number" placeholder="80" /></div></div>'
        : '<label class="lbl">静态目录名（webroot 下子目录）</label><input id="nsRoot" class="field" placeholder="mysite" />';
    };

    const certFields = () => { $('nsManual').classList.toggle('hidden', !($('nsSsl').checked && $('nsCert').value === 'manual')); };
    $('nsCert') && ($('nsCert').onchange = certFields);

    };
  });
}

function renderMysql(v) {
  v.innerHTML = '<div class="mut" style="padding:18px">检测环境…</div>';
  op('mysql', { op: 'info' }).then((info) => {
    if (info && info.docker_ok === false) {
      v.innerHTML = '<div class="card"><h3>MySQL</h3><p class="mut">需要先安装并启动 Docker（在 Docker 管理中安装）。MySQL 实例由 TeaOps 通过容器管理。</p></div>';
      return;
    }
    v.innerHTML = `<div class="row" style="margin-bottom:14px"><span class="sp" style="flex:1"></span><button class="btn sm" id="myNew">新建实例</button><button class="btn sec sm" id="myRef">刷新</button></div><div id="myList" class="mut">加载中…</div>`;

        h += `<tr><td><b>${esc(m.id)}</b></td><td class="mut">${esc(m.engine)} ${esc(m.version || '')}</td><td class="mono">${m.port ? m.port : '未映射'}</td><td><span class="chip ${cls}"><span class="dot-s ${running ? 'on' : ''}"></span>${phase}</span></td><td><div class="actions" data-id="${esc(m.id)}" data-running="${running ? 1 : 0}"></div></td></tr>`;
      });

function buildMyActions(holder, reload) {
  const id = holder.dataset.id, running = holder.dataset.running === '1';
  const mk = (label, cls, fn) => { const b = el('button', { class: 'btn sm ' + (cls || 'sec') }, label); b.onclick = fn; holder.appendChild(b); };
  if (running) {
    mk('管理', '', () => myManage(id, reload));
    mk('停止', 'sec', () => op('mysql', { op: 'stop', inst: id }).then(() => { toast('已停止', 'ok'); reload(); }).catch((e) => toast(e.message, 'err')));
    mk('重启', 'sec', () => op('mysql', { op: 'restart', inst: id }).then(() => { toast('已重启', 'ok'); reload(); }).catch((e) => toast(e.message, 'err')));
  } else {
    mk('启动', '', () => op('mysql', { op: 'start', inst: id }).then(() => { toast('已启动', 'ok'); reload(); }).catch((e) => toast(e.message, 'err')));
  }
  mk('删除', 'danger', async () => {
    const keep = await confirmKeepData(id); if (keep === null) return;
    op('mysql', { op: 'remove', inst: id, keep_data: keep }).then(() => { toast('已删除', 'ok'); reload(); }).catch((e) => toast(e.message, 'err'));
  });
}

    const s = sb.data;
    v.innerHTML = `
    <div class="warn">本机管理通过明文 HTTP 暴露在 0.0.0.0:${s.port}，登录凭证以明文传输，强烈建议用防火墙仅放行可信 IP。微信扫码登录无需密码，由服务器所有者在小程序确认。</div>
    <div class="card" style="max-width:520px">
      <h3>登录账号</h3>
      <label class="lbl">账号</label>
      <input id="setUser" class="field" style="margin-bottom:12px" value="${esc(s.username)}" />
      <label class="lbl">密码</label>
      <div class="row" style="margin-bottom:4px"><input id="setPw" class="field" type="password" value="${esc(s.password)}" style="flex:1" /><button class="btn sec sm" id="setPwShow" type="button">显示</button></div>
      <h3 style="margin-top:18px">端口（改后重启 Agent 生效）</h3>
      <input id="setPort" class="field" type="number" value="${s.port}" />
      <label style="display:flex;gap:8px;align-items:center;margin:14px 0"><input type="checkbox" id="setEnabled" ${s.enabled ? 'checked' : ''}/> 启用本机管理（关闭后需重启生效）</label>
      <button class="btn" id="setSave">保存</button>
      <div class="err ok" id="setMsg" style="margin-top:10px"></div>
    </div>`;
    $('setPwShow').onclick = () => { const i = $('setPw'); const show = i.type === 'password'; i.type = show ? 'text' : 'password'; $('setPwShow').textContent = show ? '隐藏' : '显示'; };
    $('setSave').onclick = () => {
      const body = { username: $('setUser').value, password: $('setPw').value, port: Number($('setPort').value), enabled: $('setEnabled').checked };
      api('/api/settings', { method: 'POST', body: JSON.stringify(body) })
        .then((b) => { const m = $('setMsg'); m.className = 'err ok'; m.textContent = '已保存' + (b.needs_restart ? '（端口/开关改动需重启 Agent 生效）' : ''); setUser(body.username); })
        .catch((e) => { const m = $('setMsg'); m.className = 'err'; m.textContent = e.message; });
    };
  }).catch((e) => { v.innerHTML = '<div class="card">加载失败：' + esc(e.message) + '</div>'; });
}

// =========================================================================
// Bootstrap
// =========================================================================
$('pw').addEventListener('keydown', (e) => { if (e.key === 'Enter') doLogin(); });

// Only offer WeChat scan login when this server is bound to a mini-program
// account (scan login validates server ownership). Otherwise hide the tab
// segment entirely and stay on password login.
function initWxOption() {
  fetch('/api/wx/status').then((r) => r.json()).then((b) => {
    if (b && b.bound) return; // keep the tab
    const seg = document.querySelector('#login .seg');
    if (seg) seg.classList.add('hidden');
    loginMode('pw');
  }).catch(() => {
    const seg = document.querySelector('#login .seg');
    if (seg) seg.classList.add('hidden');
    loginMode('pw');
  });
}
initWxOption();

if (S.token) showApp();
</script>
</body>
</html>
