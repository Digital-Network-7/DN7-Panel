    op('nginx', { op: 'list_named_certs' }).then((d) => {
      named = (d.certs || []).filter((c) => c.has_cert);
      $('nsNamed').innerHTML = named.length
        ? named.map((c) => `<option value="${esc(c.name)}">${esc(c.name)}${c.domain ? '（' + esc(c.domain) + '）' : ''}</option>`).join('')
        : '<option value="">证书库为空，请先在「SSL 证书」创建</option>';
    }).catch(() => {});

    // Available containers (for the proxy_container picker).
    let containers = [];
    op('nginx', { op: 'list_containers' }).then((d) => { containers = d.containers || []; if ($('nsKind').value === 'proxy_container') kindFields(); }).catch(() => {});

    // Static-upload state: collected files (zip or folder) staged client-side,
    // uploaded after the site is created (so the webroot name is known).
    const staticUpload = { mode: null, zip: null, files: [] };

    const kindFields = () => {
      const k = $('nsKind').value;
      if (k === 'proxy_host') {
        $('nsKindFields').innerHTML = '<div class="formgrid"><div><label class="lbl">协议</label><select id="nsScheme" class="field"><option value="http">HTTP</option><option value="https">HTTPS</option></select></div><div><label class="lbl">宿主机端口</label><input id="nsTarget" class="field" placeholder="3000 或 127.0.0.1:3000" /></div></div>';
      } else if (k === 'proxy_container') {
        const opts = containers.length
          ? containers.map((c) => `<option value="${esc(c.name)}">${esc(c.name)}${c.ports ? ' · ' + esc(c.ports) : ''}</option>`).join('')
          : '<option value="">未发现运行中的容器</option>';
        $('nsKindFields').innerHTML = `<div class="formgrid"><div><label class="lbl">协议</label><select id="nsScheme" class="field"><option value="http">HTTP</option><option value="https">HTTPS</option></select></div><div><label class="lbl">容器</label><select id="nsCtn" class="field">${opts}</select></div><div><label class="lbl">容器端口</label><input id="nsCtnPort" class="field" type="number" placeholder="80" /></div></div>`;
      } else {
        $('nsKindFields').innerHTML = `
          <label class="lbl">静态站点目录名</label><input id="nsRoot" class="field" placeholder="mysite" style="margin-bottom:10px" />
          <label class="lbl">上传内容</label>
          <div class="dropz" id="nsDrop"><b>点击选择</b> ZIP 压缩包，或拖拽文件夹到此处<br/><span style="font-size:11.5px">支持上传 .zip，或选择整个文件夹逐文件上传</span></div>
          <input type="file" id="nsZip" accept=".zip" class="hidden" />
          <input type="file" id="nsDir" webkitdirectory multiple class="hidden" />
          <div class="row" style="gap:8px;margin-top:8px"><button type="button" class="btn sm sec" id="nsPickZip">选择 ZIP</button><button type="button" class="btn sm sec" id="nsPickDir">选择文件夹</button></div>
          <div class="uplist" id="nsUpList"></div>`;
        wireStaticPickers();
      }
    };
    const wireStaticPickers = () => {
      const drop = $('nsDrop');
      $('nsPickZip').onclick = () => $('nsZip').click();
      $('nsPickDir').onclick = () => $('nsDir').click();
      drop.onclick = () => $('nsZip').click();
      $('nsZip').onchange = (e) => { const f = e.target.files[0]; if (!f) return; staticUpload.mode = 'zip'; staticUpload.zip = f; staticUpload.files = []; $('nsUpList').innerHTML = `已选择 ZIP：${esc(f.name)}（${fmtBytes(f.size)}）`; };
      $('nsDir').onchange = (e) => { const fs = Array.from(e.target.files || []); if (!fs.length) return; staticUpload.mode = 'dir'; staticUpload.zip = null; staticUpload.files = fs; $('nsUpList').innerHTML = `已选择 ${fs.length} 个文件：<br/>` + fs.slice(0, 20).map((f) => esc(f.webkitRelativePath || f.name)).join('<br/>') + (fs.length > 20 ? '<br/>…' : ''); };
      ['dragover', 'dragenter'].forEach((ev) => drop.addEventListener(ev, (e) => { e.preventDefault(); drop.classList.add('drag'); }));
      ['dragleave', 'drop'].forEach((ev) => drop.addEventListener(ev, (e) => { e.preventDefault(); drop.classList.remove('drag'); }));
      drop.addEventListener('drop', (e) => { const f = (e.dataTransfer.files || [])[0]; if (f && /\.zip$/i.test(f.name)) { staticUpload.mode = 'zip'; staticUpload.zip = f; staticUpload.files = []; $('nsUpList').innerHTML = `已选择 ZIP：${esc(f.name)}（${fmtBytes(f.size)}）`; } });
    };
    $('nsKind').onchange = kindFields; kindFields();

    // Path-rule rows.
    const locRow = (v) => {
      v = v || {};
      const wrap = el('div', { class: 'locrule' });
      wrap.innerHTML = `
        <div class="lr-head"><input class="field lr-path" placeholder="/api" value="${esc(v.path || '')}" /><button type="button" class="rm">×</button></div>
        <div class="lr-row"><select class="field proto lr-scheme"><option value="http">HTTP</option><option value="https">HTTPS</option></select><input class="field lr-target" placeholder="127.0.0.1:3001" value="${esc(v.target || '')}" /></div>
        <label class="switch" style="padding:8px 0 2px"><input type="checkbox" class="lr-ws"${v.websockets ? ' checked' : ''} /><span class="swbox"></span><span class="swtxt"><b>Websockets 支持</b></span></label>`;
      if (v.scheme === 'https') wrap.querySelector('.lr-scheme').value = 'https';
      wrap.querySelector('.rm').onclick = () => wrap.remove();
      $('nsLocs').appendChild(wrap);
    };
    $('nsLocAdd').onclick = () => locRow();

    // SSL toggles.
    $('nsSsl').onchange = () => { $('nsCertWrap').classList.toggle('hidden', !$('nsSsl').checked); certFields(); };
    const certFields = () => {
      const on = $('nsSsl').checked;
      const m = $('nsCert').value;
      $('nsManual').classList.toggle('hidden', !(on && m === 'manual'));
      $('nsNamedWrap').classList.toggle('hidden', !(on && m === 'named'));
    };
    $('nsCert') && ($('nsCert').onchange = certFields);

    const collectLocs = () => Array.from($('nsLocs').querySelectorAll('.locrule')).map((w) => ({
      path: w.querySelector('.lr-path').value.trim(),
      scheme: w.querySelector('.lr-scheme').value,
      target: w.querySelector('.lr-target').value.trim(),
      websockets: w.querySelector('.lr-ws').checked,
    })).filter((l) => l.path || l.target);

    $('nsGo').onclick = async () => {
      const k = $('nsKind').value;
      const body = { op: 'add_site', server_name: $('nsName').value.trim(), kind: k, ssl: $('nsSsl').checked, cache: $('nsCache').checked, block_attacks: $('nsBlock').checked, websockets: $('nsWs').checked, locations: collectLocs() };
      if (!body.server_name) return toast('请输入域名', 'err');
      if (k === 'proxy_host') { body.scheme = $('nsScheme').value; const p = $('nsTarget').value.trim(); if (!p) return toast('请输入宿主机端口', 'err'); body.target_url = /^\d+$/.test(p) ? '127.0.0.1:' + p : p; }
      else if (k === 'proxy_container') { body.scheme = $('nsScheme').value; body.container = $('nsCtn').value.trim(); body.container_port = Number($('nsCtnPort').value); if (!body.container) return toast('请选择容器', 'err'); }
      else { body.root = $('nsRoot').value.trim(); if (!body.root) return toast('请输入静态站点目录名', 'err'); if (!staticUpload.mode) return toast('请选择要上传的 ZIP 或文件夹', 'err'); }
      if (body.ssl) {
        body.cert_mode = $('nsCert').value;
        if (body.cert_mode === 'manual') { body.cert_pem = $('nsCertPem').value; body.key_pem = $('nsKeyPem').value; }
        else if (body.cert_mode === 'named') { body.cert_name = $('nsNamed').value; if (!body.cert_name) return toast('请先在 SSL 证书库创建证书', 'err'); }
      }
      $('nsGo').disabled = true; $('nsJob').classList.remove('hidden'); $('nsJob').innerHTML = '<div class="mut">提交中…</div>';
      // For static sites, upload content first so the webroot exists before the
      // site is generated (nginx -t needs the root to exist for some checks).
      try {
        if (k === 'static') { $('nsJob').innerHTML = '<div class="mut">上传站点内容…</div>'; await uploadStatic(body.root, staticUpload); }
      } catch (e) { toast('上传失败：' + e.message, 'err'); $('nsJob').innerHTML = ''; $('nsGo').disabled = false; return; }
      op('nginx', body).then((r) => {
        if (r.op_id) renderJob($('nsJob'), 'nginx', r.op_id, '', { onDone: () => { toast('站点已创建', 'ok'); close(); reload(); }, onError: () => { $('nsGo').disabled = false; } });
        else { toast('站点已创建', 'ok'); close(); reload(); }
      }).catch((e) => { toast(e.message, 'err'); $('nsJob').innerHTML = ''; $('nsGo').disabled = false; });
    };
  });
}

// Upload staged static content to a site's webroot. ZIP → one extract request;
// folder → per-file requests (first file clears the webroot).
async function uploadStatic(root, su) {
  if (su.mode === 'zip' && su.zip) {
    const qs = `root=${encodeURIComponent(root)}&mode=zip&clear=1`;
    const r = await fetch('/api/nginx/static-upload?' + qs, { method: 'POST', headers: { 'Authorization': 'Bearer ' + S.token }, body: su.zip });
    const b = await r.json().catch(() => ({}));
    if (!r.ok || b.ok === false) throw new Error(b.error || '上传失败');
    return;
  }
  if (su.mode === 'dir' && su.files.length) {
    for (let i = 0; i < su.files.length; i++) {
      const f = su.files[i];
      // Strip the leading top-level folder so files land at the webroot root.
      let rel = f.webkitRelativePath || f.name;
      const slash = rel.indexOf('/');
      if (slash > 0) rel = rel.slice(slash + 1);
      const qs = `root=${encodeURIComponent(root)}&mode=file&rel=${encodeURIComponent(rel)}` + (i === 0 ? '&clear=1' : '');
      const r = await fetch('/api/nginx/static-upload?' + qs, { method: 'POST', headers: { 'Authorization': 'Bearer ' + S.token }, body: f });
      const b = await r.json().catch(() => ({}));
      if (!r.ok || b.ok === false) throw new Error(b.error || ('上传失败：' + rel));
    }
  }
}

// SSL certificate management. Two sections:
//   1. Standalone certs — create/list/delete certs independent of any site.
//   2. Per-site certs — each site's current cert status + (re)issue.
function ngCerts() {
  modal('SSL 证书管理', `
    <div class="seg" id="ngCertTabs" style="margin-bottom:14px">
      <button class="on" data-t="standalone">证书库</button>
      <button data-t="sites">站点证书</button>
    </div>
    <div id="ngCertBody">${loading()}</div>`, () => {
    let tab = 'standalone';
    const loadStandalone = () => op('nginx', { op: 'list_named_certs' }).then((d) => {
      const certs = d.certs || [];
      let h = '<div class="row" style="margin-bottom:12px"><span class="mut" style="font-size:12.5px;flex:1">独立创建的证书可在「添加站点」或「站点证书」中被复用。</span><button class="btn sm" id="ngCertNew">创建证书</button></div>';
      if (!certs.length) { h += '<div class="empty">暂无证书。点击「创建证书」新建。</div>'; }
      else {
        h += '<table class="optable"><tr><th>名称</th><th>域名</th><th>方式</th><th>到期</th><th>使用</th><th class="act">操作</th></tr>';
        certs.forEach((c) => {
          const modeLabel = { le: "Let's Encrypt", self: '自签名', manual: '手动' }[c.cert_mode] || c.cert_mode;
          const used = (c.used_by && c.used_by.length) ? esc(c.used_by.join('、')) : '<span class="mut">未使用</span>';
          h += `<tr><td><b>${esc(c.name)}</b>${c.has_cert ? '' : ' <span class="chip warn">缺失</span>'}</td><td class="mut">${esc(c.domain || '-')}</td><td class="mut">${esc(modeLabel)}</td><td class="mono" style="font-size:12px">${esc(c.not_after || '-')}</td><td style="font-size:12px">${used}</td><td class="act"><button class="btn sm danger" data-del="${esc(c.name)}">删除</button></td></tr>`;
        });
        h += '</table>';
      }
      $('ngCertBody').innerHTML = '<div class="tablewrap">' + h + '</div>';
      $('ngCertNew').onclick = () => ngCreateCert(loadStandalone);
      document.querySelectorAll('#ngCertBody [data-del]').forEach((b) => b.onclick = async () => { if (await confirmDanger('删除证书「' + b.dataset.del + '」？')) op('nginx', { op: 'delete_cert', cert_name: b.dataset.del }).then(() => { toast('已删除', 'ok'); loadStandalone(); }).catch((e) => toast(e.message, 'err')); });
    }).catch((e) => { $('ngCertBody').innerHTML = `<p class="err">${esc(e.message)}</p>`; });
    const loadSites = () => op('nginx', { op: 'list_certs' }).then((d) => {
      const certs = d.certs || [];
      if (!certs.length) { $('ngCertBody').innerHTML = '<div class="empty">暂无站点。先在「添加站点」创建站点，再来管理其证书。</div>'; return; }
      let h = '<table class="optable"><tr><th>域名</th><th>方式</th><th>到期</th><th>状态</th><th class="act">操作</th></tr>';
      certs.forEach((c) => {
        const modeLabel = c.cert_mode === 'named' ? '引用证书库' : ({ le: "Let's Encrypt", self: '自签名', manual: '手动' }[c.cert_mode] || (c.ssl ? c.cert_mode : '—'));
        const status = !c.ssl ? '<span class="chip">未启用</span>' : (c.has_cert ? '<span class="chip on">已签发</span>' : '<span class="chip warn">缺失</span>');
        h += `<tr><td><b>${esc(c.server_name)}</b></td><td class="mut">${esc(modeLabel)}</td><td class="mono" style="font-size:12px">${esc(c.not_after || '-')}</td><td>${status}</td><td class="act"><button class="btn sm" data-id="${esc(c.id)}" data-name="${esc(c.server_name)}">配置证书</button></td></tr>`;
      });
      $('ngCertBody').innerHTML = '<div class="tablewrap">' + h + '</table></div>';
      document.querySelectorAll('#ngCertBody [data-id]').forEach((b) => b.onclick = () => ngSetCert(b.dataset.id, b.dataset.name, loadSites));
    }).catch((e) => { $('ngCertBody').innerHTML = `<p class="err">${esc(e.message)}</p>`; });
    const refresh = () => { tab === 'standalone' ? loadStandalone() : loadSites(); };
    document.querySelectorAll('#ngCertTabs button').forEach((b) => b.onclick = () => {
      tab = b.dataset.t;
      document.querySelectorAll('#ngCertTabs button').forEach((x) => x.className = x.dataset.t === tab ? 'on' : '');
      $('ngCertBody').innerHTML = loading();
      refresh();
    });
    refresh();
  });
}

// =========================================================================
// MySQL management (TeaOps-provisioned instances only)
// =========================================================================
function renderMysql(v) {
  v.innerHTML = `<div style="padding:8px">${loading('正在检测环境')}</div>`;
  if (getJob('mysql:install')) {
    v.innerHTML = `<div class="card"><h3>正在创建数据库</h3><div id="myInstallJob"></div></div>`;
    reattachJob($('myInstallJob'), 'mysql:install', { onDone: () => setTimeout(() => renderMysql(v), 800) });
    return;
  }
  op('mysql', { op: 'info' }).then((info) => {
    if (info && info.docker_ok === false) {
      v.innerHTML = '<div class="card"><h3>MySQL</h3><p class="mut">需要先安装并启动 Docker（在 Docker 管理中安装）。数据库由 TeaOps 通过容器管理。</p></div>';
      return;
    }
    op('mysql', { op: 'list' }).then((d) => {
      const arr = d.instances || [];
      const m = arr[0];
      if (!m) {
        v.innerHTML = `<div class="card"><h3>MySQL / MariaDB</h3><p class="mut">尚未创建数据库。一台主机由 TeaOps 托管一个实例，可在其中创建多个库。</p><button class="btn" id="myNew">创建数据库</button></div>`;
        $('myNew').onclick = () => myInstall(() => renderMysql(v));
        return;
      }
      // Single-instance layout: a header card with status + lifecycle actions,
      // then the management panel (databases / accounts / SQL / settings) inline.
      const running = m.running;
      const phase = m.phase === 'initializing' ? '初始化中' : (running ? '运行中' : '已停止');
      const cls = m.phase === 'initializing' ? 'warn' : (running ? 'on' : 'off');
      v.innerHTML = `
        <div class="card" style="margin-bottom:16px">
          <div class="row" style="align-items:center">
            <div style="flex:1">
              <div style="font-size:18px;font-weight:650">${esc(m.engine)} <span class="mut" style="font-size:14px;font-weight:400">${esc(m.version || '')}</span></div>
              <div class="mut" style="font-size:12.5px;margin-top:3px">端口 ${m.port ? m.port : '未映射'} · <span class="chip ${cls}"><span class="dot-s ${running ? 'on' : ''}"></span>${phase}</span></div>
            </div>
            <div class="actions" id="myLifecycle"></div>
          </div>
        </div>
        <div id="myPanel"></div>`;
      const reload = () => renderMysql(v);
      const lc = $('myLifecycle');
      const mk = (label, klass, fn) => { const b = el('button', { class: 'btn sm ' + (klass || 'sec') }, label); b.onclick = fn; lc.appendChild(b); };
      if (running) {
        mk('停止', 'sec', () => op('mysql', { op: 'stop', inst: m.id }).then(() => { toast('已停止', 'ok'); reload(); }).catch((e) => toast(e.message, 'err')));
        mk('重启', 'sec', () => op('mysql', { op: 'restart', inst: m.id }).then(() => { toast('已重启', 'ok'); reload(); }).catch((e) => toast(e.message, 'err')));
      } else {
        mk('启动', '', () => op('mysql', { op: 'start', inst: m.id }).then(() => { toast('已启动', 'ok'); reload(); }).catch((e) => toast(e.message, 'err')));
      }
      mk('删除', 'danger', async () => { const keep = await confirmKeepData(); if (keep === null) return; op('mysql', { op: 'remove', inst: m.id, keep_data: keep }).then(() => { toast('已删除', 'ok'); reload(); }).catch((e) => toast(e.message, 'err')); });
      // Management panel — only meaningful when the instance can serve queries.
      if (running) myPanel($('myPanel'), m.id, reload);
      else $('myPanel').innerHTML = '<div class="empty">实例未运行，启动后可管理数据库与账号</div>';
    }).catch((e) => { v.innerHTML = `<div class="card"><p class="err">${esc(e.message)}</p></div>`; });
  }).catch((e) => { v.innerHTML = `<div class="card"><p class="err">${esc(e.message)}</p></div>`; });
}
function confirmKeepData() { return new Promise((res) => { modal('删除数据库', '<p style="margin:0 0 16px">删除将移除数据库容器。是否保留数据卷（其中的所有库和数据）？</p><div class="row" style="justify-content:flex-end"><button class="btn sec" id="kdCancel">取消</button><button class="btn sec" id="kdKeep">保留数据</button><button class="btn danger" id="kdDrop">连同数据删除</button></div>', (close) => { $('kdCancel').onclick = () => { close(); res(null); }; $('kdKeep').onclick = () => { close(); res(true); }; $('kdDrop').onclick = () => { close(); res(false); }; }); }); }

function myInstall(reload) {
  // Engine+version merged into one picker; default MariaDB 11.4.
  const OPTS = [
    { v: 'mariadb|11.4', label: 'MariaDB 11.4' },
    { v: 'mariadb|10.11', label: 'MariaDB 10.11' },
    { v: 'mariadb|10.6', label: 'MariaDB 10.6' },
    { v: 'mysql|8.4', label: 'MySQL 8.4' },
    { v: 'mysql|8.0', label: 'MySQL 8.0' },
    { v: 'mysql|5.7', label: 'MySQL 5.7' },
  ];
  modal('创建数据库', `
    <div class="formgrid">
      <div><label class="lbl">引擎 / 版本</label><select id="miEv" class="field">${OPTS.map((o) => `<option value="${o.v}"${o.v === 'mariadb|11.4' ? ' selected' : ''}>${o.label}</option>`).join('')}</select></div>
      <div><label class="lbl">对外端口（映射 3306）</label><input id="miPort" class="field" type="number" placeholder="3306" /></div>
      <div style="display:flex;align-items:flex-end"><label style="display:flex;gap:7px;align-items:center"><input type="checkbox" id="miExpose" checked /> 对外映射端口</label></div>
    </div>
    <p class="mut" style="font-size:12px;margin-top:10px">root 密码将自动生成，可在「管理」中查看。创建后可在实例中建立多个数据库。</p>
    <div class="row" style="justify-content:flex-end;margin-top:12px"><button class="btn" id="miGo">创建</button></div>
    <div class="hidden" id="miJob" style="margin-top:14px"></div>`, (close) => {
    $('miExpose').onchange = () => { $('miPort').disabled = !$('miExpose').checked; };
    $('miGo').onclick = () => {
      const [engine, version] = $('miEv').value.split('|');
      const body = { op: 'install', engine, version, expose: $('miExpose').checked };
      if (body.expose && $('miPort').value) body.port = Number($('miPort').value);
      $('miGo').disabled = true; $('miJob').classList.remove('hidden');
      op('mysql', body).then((r) => renderJob($('miJob'), 'mysql', r.op_id, 'mysql:install', { onDone: () => { toast('数据库已创建', 'ok'); close(); reload(); }, onError: () => { $('miGo').disabled = false; } })).catch((e) => { toast(e.message, 'err'); $('miGo').disabled = false; });
    };
  });
}

function myPanel(host, id, reload) {
  host.innerHTML = `
    <div class="subtabs" id="myTabs"><button data-t="info" class="on">数据库</button><button data-t="users">账号</button><button data-t="more">设置</button></div>
    <div id="myMBody"></div>`;
  const tabs = host.querySelector('#myTabs');
  const sel = (t) => { tabs.querySelectorAll('button').forEach((b) => b.classList.toggle('on', b.dataset.t === t)); if (t === 'info') myInfo(id); else if (t === 'users') myUsers(id); else myMore(id, () => {}, reload); };
  tabs.querySelectorAll('button').forEach((b) => b.onclick = () => sel(b.dataset.t));
  sel('info');
}
function myInfo(id) {
  const b = $('myMBody'); b.innerHTML = loading();
  op('mysql', { op: 'credentials', inst: id }).then((c) => {
    b.innerHTML = `<table>
      <tr><th style="width:120px">主机</th><td class="mono">${esc(c.host || '127.0.0.1')}</td></tr>
      <tr><th>端口</th><td class="mono">${esc(String(c.port || ''))}</td></tr>
      <tr><th>用户</th><td class="mono">${esc(c.user || 'root')}</td></tr>
      <tr><th>密码</th><td class="mono">${esc(c.password || '')}</td></tr>
    </table>
    <div class="sechead" style="margin-top:18px"><h3>数据库</h3><span class="sp"></span><button class="btn sm" id="myAddDb">新建数据库</button></div><div id="myDbs">${loading()}</div>`;
    $('myAddDb').onclick = () => modal('新建数据库', `<label class="lbl">库名</label><input id="cdbName" class="field" placeholder="myapp" style="margin-bottom:16px" /><div class="row" style="justify-content:flex-end"><button class="btn" id="cdbGo">创建</button></div>`, (close) => { $('cdbGo').onclick = () => { const name = $('cdbName').value.trim(); if (!name) return; op('mysql', { op: 'create_database', inst: id, database: name }).then(() => { close(); toast('已创建', 'ok'); myInfo(id); }).catch((e) => toast(e.message, 'err')); }; });
    loadMyDbs(id);
  }).catch((e) => { b.innerHTML = `<p class="err">${esc(e.message)}</p>`; });
}
function loadMyDbs(id) {
  op('mysql', { op: 'databases', inst: id }).then((d) => {
    const arr = d.databases || [];
    if (!arr.length) { $('myDbs').innerHTML = '<div class="empty">无</div>'; return; }
    $('myDbs').innerHTML = '<table class="optable"><tr><th>库名</th><th>表数</th><th>大小</th><th class="act">操作</th></tr>' + arr.map((x) => `<tr><td>${esc(x.name)}${x.system ? ' <span class="mut" style="font-size:11px">系统</span>' : ''}</td><td>${x.tables != null ? x.tables : '-'}</td><td class="mut">${x.bytes != null ? fmtBytes(x.bytes) : '-'}</td><td class="act">${x.system ? '' : `<button class="btn sm danger" data-db="${esc(x.name)}">删除</button>`}</td></tr>`).join('') + '</table>';
    document.querySelectorAll('#myDbs [data-db]').forEach((btn) => btn.onclick = async () => { if (await confirmDanger(`删除数据库 ${btn.dataset.db}？此操作会清空其中所有数据。`)) op('mysql', { op: 'drop_database', inst: id, database: btn.dataset.db }).then(() => { toast('已删除', 'ok'); loadMyDbs(id); }).catch((e) => toast(e.message, 'err')); });
  }).catch((e) => { $('myDbs').innerHTML = `<p class="err">${esc(e.message)}</p>`; });
}
function myUsers(id) {
  const b = $('myMBody'); b.innerHTML = '<div class="sechead"><h3>账号</h3><span class="sp"></span><button class="btn sm" id="myAddU">新建账号</button></div><div id="myUList">' + loading() + '</div>';
  $('myAddU').onclick = () => modal('新建账号', `<div class="formgrid"><div><label class="lbl">用户名</label><input id="auU" class="field" /></div><div><label class="lbl">来源主机</label><input id="auH" class="field" value="%" /></div><div class="full"><label class="lbl">密码</label><input id="auP" class="field" /></div></div><div class="row" style="justify-content:flex-end;margin-top:14px"><button class="btn" id="auGo">创建</button></div>`, (close) => { $('auGo').onclick = () => op('mysql', { op: 'create_user', inst: id, username: $('auU').value.trim(), host: $('auH').value.trim() || '%', password: $('auP').value }).then(() => { close(); toast('已创建', 'ok'); myUsers(id); }).catch((e) => toast(e.message, 'err')); });
  op('mysql', { op: 'list_users', inst: id }).then((d) => {
    const users = d.users || [];
    if (!users.length) { $('myUList').innerHTML = '<div class="empty">无</div>'; return; }
    $('myUList').innerHTML = '<table><tr><th>用户</th><th>主机</th><th style="width:1%">操作</th></tr>' + users.map((u) => `<tr><td>${esc(u.user)}</td><td class="mut">${esc(u.host)}</td><td>${u.system ? '<span class="mut" style="font-size:12px">系统</span>' : `<button class="btn sm danger" data-u="${esc(u.user)}" data-h="${esc(u.host)}">删除</button>`}</td></tr>`).join('') + '</table>';
    document.querySelectorAll('#myUList [data-u]').forEach((btn) => btn.onclick = async () => { if (await confirmDanger(`删除账号 ${btn.dataset.u}@${btn.dataset.h}？`)) op('mysql', { op: 'drop_user', inst: id, username: btn.dataset.u, host: btn.dataset.h }).then(() => { toast('已删除', 'ok'); myUsers(id); }).catch((e) => toast(e.message, 'err')); });
  }).catch((e) => { $('myUList').innerHTML = `<p class="err">${esc(e.message)}</p>`; });
}
function myQuery() { /* SQL runner removed per product decision. */ }
function myMore(id, close, reload) {
  const b = $('myMBody');
  b.innerHTML = `
    <div class="sechead"><h3>重置 root 密码</h3></div><div class="row"><button class="btn sec sm" id="myReset">重置并显示新密码</button></div>
    <div class="sechead" style="margin-top:18px"><h3>端口映射</h3></div><div class="row"><input id="myPort" class="field" type="number" placeholder="3306" style="max-width:160px" /><label style="display:flex;gap:7px;align-items:center"><input type="checkbox" id="myExpose" checked /> 对外映射</label><button class="btn sec sm" id="myPortGo">应用（重建容器）</button></div>
    <div class="sechead" style="margin-top:18px"><h3>备份</h3></div><div class="row"><button class="btn sec sm" id="myBackup">导出 mysqldump</button></div>
    <div id="myMoreLine" class="ok" style="margin-top:10px"></div>
    <div class="hidden" id="myBackupJob" style="margin-top:12px"></div>`;
  $('myReset').onclick = () => op('mysql', { op: 'reset_password', inst: id }).then((r) => { $('myMoreLine').textContent = '新 root 密码：' + (r.password || ''); }).catch((e) => toast(e.message, 'err'));
  $('myPortGo').onclick = () => { const body = { op: 'change_port', inst: id, expose: $('myExpose').checked }; if (body.expose && $('myPort').value) body.port = Number($('myPort').value); op('mysql', body).then(() => { toast('已应用', 'ok'); reload(); }).catch((e) => toast(e.message, 'err')); };
  $('myBackup').onclick = () => { $('myBackup').disabled = true; $('myBackupJob').classList.remove('hidden'); op('mysql', { op: 'backup', inst: id }).then((r) => renderJob($('myBackupJob'), 'mysql', r.op_id, '', { onDone: () => { toast('备份完成', 'ok'); $('myBackup').disabled = false; }, onError: () => { $('myBackup').disabled = false; } })).catch((e) => { toast(e.message, 'err'); $('myBackup').disabled = false; }); };
}

function renderSettings(v) {
  v.innerHTML = '<div class="card">' + loading() + '</div>';
  api('/api/settings').then((sb) => {
    const s = sb.data;
    v.innerHTML = `
    <div class="card" style="max-width:520px">
      <h3>登录账号</h3>
      <label class="lbl">账号</label>
      <input id="setUser" class="field" style="margin-bottom:12px" value="${esc(s.username)}" />
      <label class="lbl">密码</label>
      <div class="row" style="margin-bottom:4px"><input id="setPw" class="field" type="password" value="${esc(s.password)}" style="flex:1" /><button class="btn sec sm" id="setPwShow" type="button">显示</button></div>
      <h3 style="margin-top:18px">端口（改后重启 Agent 生效）</h3>
      <input id="setPort" class="field" type="number" value="${s.port}" />
      <label style="display:flex;gap:8px;align-items:center;margin:14px 0"><input type="checkbox" id="setEnabled" ${s.enabled ? 'checked' : ''}/> 启用本机管理（关闭后需重启生效）</label>
      <button class="btn" id="setSave">保存</button>
      <div class="err ok" id="setMsg" style="margin-top:10px"></div>
    </div>`;
    $('setPwShow').onclick = () => { const i = $('setPw'); const show = i.type === 'password'; i.type = show ? 'text' : 'password'; $('setPwShow').textContent = show ? '隐藏' : '显示'; };
    $('setSave').onclick = () => {
      const body = { username: $('setUser').value, password: $('setPw').value, port: Number($('setPort').value), enabled: $('setEnabled').checked };
      api('/api/settings', { method: 'POST', body: JSON.stringify(body) })
        .then((b) => { const m = $('setMsg'); m.className = 'err ok'; m.textContent = '已保存' + (b.needs_restart ? '（端口/开关改动需重启 Agent 生效）' : ''); setUser(body.username); })
        .catch((e) => { const m = $('setMsg'); m.className = 'err'; m.textContent = e.message; });
    };
  }).catch((e) => { v.innerHTML = '<div class="card">加载失败：' + esc(e.message) + '</div>'; });
}

// =========================================================================
// Custom select dropdown — replaces the native OS <select> popup (which looks
// out of place, especially in dark mode) with a themed list, app-wide. The
// real <select> stays the source of truth: we intercept its dropdown, render
// our own popup, then write the chosen value back and fire a `change` event so
// every existing handler keeps working. Works for dynamically-added selects too
// via event delegation.
// =========================================================================
const SELX = { sel: null, pop: null };
function selxClose() {
  // Remove the tracked popup AND any stray ones (defensive against desync).
  document.querySelectorAll('.selx-pop').forEach((p) => p.remove());
  SELX.pop = null;
  SELX.sel = null;
}
function selxOpen(sel) {
  selxClose();
  if (sel.disabled || !sel.options.length) return;
  SELX.sel = sel;
  const pop = el('div', { class: 'selx-pop' });
  Array.from(sel.options).forEach((o, i) => {
    const opt = el('div', { class: 'selx-opt' + (i === sel.selectedIndex ? ' sel' : '') + (o.disabled ? ' dis' : '') }, esc(o.textContent));
    if (!o.disabled) {
      opt.addEventListener('mousedown', (e) => {
        e.preventDefault();
        if (sel.selectedIndex !== i) { sel.selectedIndex = i; sel.dispatchEvent(new Event('change', { bubbles: true })); }
        selxClose();
      });
    }
    pop.appendChild(opt);
  });
  document.body.appendChild(pop);
  SELX.pop = pop;
  // Position under (or above, if no room) the select, matching its width.
  const r = sel.getBoundingClientRect();
  pop.style.left = r.left + 'px';
  pop.style.width = r.width + 'px';
  const below = window.innerHeight - r.bottom;
  if (below < 280 && r.top > below) { pop.style.bottom = (window.innerHeight - r.top + 4) + 'px'; }
  else { pop.style.top = (r.bottom + 4) + 'px'; }
  // Scroll the selected option into view within the popup only.
  const selOpt = pop.querySelector('.selx-opt.sel');
  if (selOpt) selOpt.scrollIntoView({ block: 'nearest' });
}
// Intercept native dropdown on pointerdown (capture) for any <select>.
document.addEventListener('mousedown', (e) => {
  const sel = e.target.closest && e.target.closest('select');
  if (sel) {
    e.preventDefault(); // suppress the native OS dropdown
    if (SELX.sel === sel) { selxClose(); } else { sel.focus(); selxOpen(sel); }
    return;
  }
  if (SELX.pop && !e.target.closest('.selx-pop')) selxClose();
}, true);
// Keyboard: open on Enter/Space/Arrow when focused; navigate + select in popup.
document.addEventListener('keydown', (e) => {
  const a = document.activeElement;
  if (a && a.tagName === 'SELECT' && !SELX.pop && (e.key === 'Enter' || e.key === ' ' || e.key === 'ArrowDown' || e.key === 'ArrowUp')) {
    e.preventDefault(); selxOpen(a); return;
  }
  if (!SELX.pop) return;
  if (e.key === 'Escape') { e.preventDefault(); selxClose(); return; }
  const opts = Array.from(SELX.pop.querySelectorAll('.selx-opt:not(.dis)'));
  if (!opts.length) return;
  let cur = opts.findIndex((o) => o.classList.contains('active'));
  if (cur < 0) cur = opts.findIndex((o) => o.classList.contains('sel'));
  if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
    e.preventDefault();
    cur = e.key === 'ArrowDown' ? Math.min(opts.length - 1, cur + 1) : Math.max(0, cur - 1);
    opts.forEach((o) => o.classList.remove('active'));
    opts[cur].classList.add('active'); opts[cur].scrollIntoView({ block: 'nearest' });
  } else if (e.key === 'Enter' && cur >= 0) {
    e.preventDefault(); opts[cur].dispatchEvent(new MouseEvent('mousedown'));
  }
}, true);
// Reposition/close on scroll or resize (popup is fixed-position). Ignore scroll
// events originating inside the popup itself (long option lists scroll).
window.addEventListener('scroll', (e) => { if (SELX.pop && e.target && e.target.closest && e.target.closest('.selx-pop')) return; selxClose(); }, true);
window.addEventListener('resize', selxClose);

$('pw').addEventListener('keydown', (e) => { if (e.key === 'Enter') doLogin(); });

// Only offer WeChat scan login when this server is bound to a mini-program
// account (scan login validates server ownership). The tab segment starts
// hidden and is revealed only once we confirm a binding — so password-only
// servers never see a WeChat tab flash, and bound servers get it as soon as
// the status returns.
function initWxOption() {
  fetch('/api/wx/status').then((r) => r.json()).then((b) => {
    if (b && b.bound) {
      const seg = $('loginSeg');
      if (seg) seg.classList.remove('hidden');
    }
  }).catch(() => {});
}
initWxOption();

if (S.token) showApp();
