<!DOCTYPE html>
<html lang="zh-CN" data-mode="auto">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>DN7 Panel</title>
<!--__DN7_HEAD__-->
<script>
  // Apply the saved theme synchronously (before first paint) so there's no
  // dark-mode flash before the main script runs.
  (function () {
    try {
      var m = localStorage.getItem('dn7_theme') || (window.__BRAND__ && window.__BRAND__.theme) || 'auto';
      var eff = m;
      if (m === 'auto') eff = (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', eff);
      document.documentElement.setAttribute('data-mode', m);
      // Decide auth view before first paint so a logged-in refresh never flashes
      // the login page (CSS below hides the opposite view based on this attr).
      document.documentElement.setAttribute('data-auth', localStorage.getItem('dn7_web_token') ? 'in' : 'out');
    } catch (e) {}
  })();
</script>
<link rel="stylesheet" href="/ui/app.css" />
</head>
<body>

<!-- Login -->
<div id="login">
  <!-- Decorative tech background (grid + drifting gradient orbs). -->
  <div class="login-bg" aria-hidden="true"><span class="orb o1"></span><span class="orb o2"></span><span class="orb o3"></span></div>
  <!-- Brand pinned top-left. -->
  <div class="login-brand"><span class="cup"><!--__DN7_BRAND_MARK__--></span><h1 class="brand-name">__DN7_BRAND_NAME__</h1></div>
  <div class="login-card">
    <div class="login-title">SIGN IN</div>
    <div class="sub">安全登录到本机控制台</div>
    <div class="login-panes">
      <div id="panewPw">
        <label class="lbl">Account</label>
        <input id="user" class="field" style="margin-bottom:12px" placeholder="Please enter your account" autocomplete="username" />
        <label class="lbl">Password</label>
        <input id="pw" class="field" type="password" placeholder="Please enter your password" autocomplete="current-password" style="margin-bottom:16px" />
        <button class="btn" style="width:100%" onclick="doLogin()">登 录</button>
        <div class="err" id="loginErr" style="margin-top:10px"></div>
      </div>
    </div>
  </div>
</div>

<!-- App -->
<div id="app" class="hidden">
  <aside>
    <div class="logo"><span class="cup"><!--__DN7_BRAND_MARK__--></span><h1 class="brand-name">__DN7_BRAND_NAME__</h1></div>
    <nav id="nav"></nav>
    <div class="foot">
      <div class="ver" id="verLine" title="点击查看更新" onclick="openUpdate()" style="cursor:pointer">Panel <b id="agentVer">…</b><span id="verDot" class="updot hidden"></span></div>
    </div>
  </aside>
  <div class="content">
    <div class="topbar">
      <h2 id="title">监控</h2>
      <span class="sp"></span>
      <button class="iconbtn" id="themeBtn" title="主题：跟随系统" onclick="cycleTheme()">◑</button>
      <div class="userbox">
        <span class="av" id="userAv">A</span>
        <b id="whoName">admin</b>
        <button class="iconbtn" style="width:28px;height:28px;font-size:13px" title="退出登录" onclick="logout()">⏻</button>
      </div>
    </div>
    <main id="view"></main>
  </div>
</div>

<div id="modalRoot"></div>

<script src="/ui/js/core.js"></script>
<script src="/ui/js/theme.js"></script>
<script src="/ui/js/login.js"></script>
<script src="/ui/js/shell.js"></script>
<script src="/ui/js/dashboard.js"></script>
<script src="/ui/js/vterm.js"></script>
<script src="/ui/js/terminal.js"></script>
<script src="/ui/js/docker.js"></script>
<script src="/ui/js/jobs.js"></script>
<script src="/ui/js/files.js"></script>
<script src="/ui/js/nginx.js"></script>
<script src="/ui/js/mysql.js"></script>
<script src="/ui/js/settings.js"></script>
<script src="/ui/js/selx.js"></script>
<script src="/ui/js/update.js"></script>
<script src="/ui/js/boot.js"></script>
</body>
</html>
