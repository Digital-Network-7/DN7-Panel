<!DOCTYPE html>
<html lang="zh-CN" data-mode="auto">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DN7 Panel</title>
<!--__DN7_HEAD__-->
<script src="/ui/js/prepaint.js"></script>
<link rel="stylesheet" href="/ui/app.css" />
</head>
<body>

<!-- Login -->
<div id="login">
  <!-- Decorative tech background (grid + drifting gradient orbs). -->
  <div class="login-bg" aria-hidden="true"><span class="orb o1"></span><span class="orb o2"></span><span class="orb o3"></span></div>
  <!-- Brand pinned top-left. -->
  <div class="login-brand"><span class="cup"><!--__DN7_BRAND_MARK__--></span><h1 class="brand-name">__DN7_BRAND_NAME__</h1></div>
  <div class="login-card">
    <div class="login-title" data-i18n="login.title">SIGN IN</div>
    <div class="sub" data-i18n="login.sub">安全登录到本机控制台</div>
    <div class="login-panes">
      <div id="panewPw">
        <label class="lbl" data-i18n="login.account">Account</label>
        <input id="user" class="field" style="margin-bottom:12px" data-i18n-ph="login.ph_account" placeholder="Please enter your account" autocomplete="username" />
        <label class="lbl" data-i18n="login.password">Password</label>
        <input id="pw" class="field" type="password" data-i18n-ph="login.ph_password" placeholder="Please enter your password" autocomplete="current-password" style="margin-bottom:16px" />
        <div id="loginTotpWrap" class="hidden" style="margin-bottom:16px">
          <label class="lbl" data-i18n="tfa.code">2FA code</label>
          <input id="loginCode" class="field" inputmode="numeric" autocomplete="one-time-code" placeholder="000000" />
        </div>
        <button class="btn" style="width:100%" id="loginBtn" data-i18n="login.submit">登 录</button>
        <div class="err" id="loginErr" style="margin-top:10px"></div>
      </div>
    </div>
  </div>
</div>

<!-- App -->
<div id="app" class="hidden">
  <aside>
    <div class="logo"><span class="cup"><!--__DN7_BRAND_MARK__--></span><h1 class="brand-name">__DN7_BRAND_NAME__</h1></div>
    <nav id="nav"></nav>
    <div class="foot">
      <div class="ver" id="verLine" data-i18n-title="shell.update_hint" title="点击查看更新" style="cursor:pointer">Panel <b id="panelVer">…</b><span id="verDot" class="updot hidden"></span></div>
    </div>
  </aside>
  <div class="content">
    <div class="topbar">
      <h2 id="title">监控</h2>
      <span class="sp"></span>
      <button class="iconbtn" id="langBtn" title="Language"></button>
      <button class="iconbtn" id="themeBtn" title="主题：跟随系统">◑</button>
      <div class="userbox" id="userBox">
        <span class="av" id="userAv">A</span>
        <b id="whoName">admin</b>
        <span class="caret" aria-hidden="true">▾</span>
      </div>
    </div>
    <main id="view"></main>
  </div>
</div>

<div id="modalRoot"></div>

<script src="/ui/js/i18n.js"></script>
<script src="/ui/js/core.js"></script>
<script src="/ui/js/auth-state.js"></script>
<script src="/ui/js/ui-state.js"></script>
<script src="/ui/js/api-client.js"></script>
<script src="/ui/js/domain-api.js"></script>
<script src="/ui/js/theme.js"></script>
<script src="/ui/js/login.js"></script>
<script src="/ui/js/shell.js"></script>
<script src="/ui/js/dashboard.js"></script>
<script src="/ui/js/vterm.js"></script>
<script src="/ui/js/terminal.js"></script>
<script src="/ui/js/docker.js"></script>
<script src="/ui/js/docker-images.js"></script>
<script src="/ui/js/docker-create.js"></script>
<script src="/ui/js/docker-manage.js"></script>
<script src="/ui/js/docker-net.js"></script>
<script src="/ui/js/jobs.js"></script>
<script src="/ui/js/files.js"></script>
<script src="/ui/js/website.js"></script>
<script src="/ui/js/website-tabs.js"></script>
<script src="/ui/js/mysql.js"></script>
<script src="/ui/js/settings.js"></script>
<script src="/ui/js/account.js"></script>
<script src="/ui/js/logs.js"></script>
<script src="/ui/js/selx.js"></script>
<script src="/ui/js/update.js"></script>
<script src="/ui/js/boot.js"></script>
</body>
</html>
