name: Build Linux Release

# Gate the code on every push; publish a release only when the BUILD NUMBER moved
# (see release.toml). codename / version (<year>.<major>.<minor>) / build are all
# set by hand in release.toml. This workflow reads them and:
#   - always runs the gate (fmt / clippy / tests) to verify the push compiles;
#   - publishes a GitHub Release ONLY when tag b<build> is absent (a new build):
#     each build is its OWN release, tagged b<build>, named "<codename> <version>
#     (build <build>)", always marked Latest. Older builds' releases are retained
#     (just no longer Latest), so every build stays downloadable.
# Deployed panels self-update straight from these GitHub releases, reaching them
# via the fastest mirror line (see src/infra/support/fetch/); the panel reads the
# latest (version, build) from releases.json and pins the binary to that build's
# b<build> release. There is no separate distribution channel.
# The build number is independent and monotonic; it never resets to track the
# version. Binaries are built for the *musl* targets and statically linked, then
# signed (Ed25519) and published with detached `.sig` files.
#
# Signing: each binary is signed with the release private key (Actions secret
# DN7_SIGN_KEY, an Ed25519 PKCS8 PEM). Deployed panels verify the signature
# against an embedded public key before self-updating.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  BIN_NAME: dn7-panel

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      codename: ${{ steps.v.outputs.codename }}
      build: ${{ steps.v.outputs.build }}
      publish: ${{ steps.v.outputs.publish }}
      rel_name: ${{ steps.v.outputs.rel_name }}
    steps:
      - name: Checkout (with tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version + build from release.toml
        id: v
        run: |
          version=$(python3 -c "import tomllib;print(tomllib.load(open('release.toml','rb'))['version'])")
          codename=$(python3 -c "import tomllib;print(tomllib.load(open('release.toml','rb'))['codename'])")
          build=$(python3 -c "import tomllib;print(tomllib.load(open('release.toml','rb'))['build'])")
          # Publish only when this build number is new (its tag b<build> doesn't
          # exist yet); otherwise CI just gated the code — no release.
          if git rev-parse -q --verify "refs/tags/b${build}" >/dev/null; then publish=false; else publish=true; fi
          rel_name="${codename} ${version} (build ${build})"
          {
            echo "version=$version"; echo "codename=$codename"; echo "build=$build"
            echo "publish=$publish"; echo "rel_name=$rel_name"
          } >> "$GITHUB_OUTPUT"
          echo "→ ${rel_name}  publish=${publish}"

  # Gate: formatting, lints (warnings = errors), and the test suite must pass
  # before anything is built/signed/released — so regressions and lint failures
  # can't reach a published release. Runs on the host (gnu) target; the final
  # static musl binaries are produced by the `build` job.
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (+ rustfmt, clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: check

      - name: Formatting
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace

      # Dependency vulnerability scan. Advisory-only (continue-on-error) so a new
      # advisory in a transitive dep with no available fix surfaces in the run
      # log without permanently blocking every release.
      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: Dependency audit
        continue-on-error: true
        run: cargo audit

      # Supply-chain gate: advisories + license policy + banned/duplicate crates
      # + source allow-list, per deny.toml. Advisory-only for license/ban drift
      # is avoided — this is a hard gate; tune deny.toml when it legitimately
      # flags a new (fixed) advisory or an additional permissive license.
      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - name: Dependency policy (cargo-deny)
        run: cargo deny check advisories bans licenses sources

  build:
    needs: [version, check]
    # Only build/sign/publish when the build number is new; otherwise the push
    # was just gated (fmt/clippy/tests) and produces no release.
    if: needs.version.outputs.publish == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            arch: x86_64
          - target: aarch64-unknown-linux-musl
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stamp version into Cargo.toml
        run: |
          sed -i -E "0,/^version = \".*\"/s//version = \"${{ needs.version.outputs.version }}\"/" Cargo.toml
          grep -m1 '^version' Cargo.toml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # `cross` runs the build inside a target-matched Docker image that already
      # has the musl cross toolchain + C compiler, so both the x86_64 and
      # aarch64 musl builds are fully static and portable.
      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      # One shipped binary: the panel. The unified `dn7` CLI is linked IN (crate
      # dn7-cli is a library) and invoked via the `dn7` symlink (argv[0]).
      - name: Build static musl binary
        run: cross build --release --target ${{ matrix.target }}

      # The flagship invariant: the released binary depends only on the Linux
      # kernel — no dynamic libraries, no external loader. Fail the release if any
      # DT_NEEDED appears (readelf reads cross-arch ELF fine on the x86_64 runner).
      - name: Verify fully static (no DT_NEEDED)
        run: |
          BIN="target/${{ matrix.target }}/release/${BIN_NAME}"
          echo "Dynamic section of ${BIN}:"
          readelf -dW "${BIN}" || true
          if readelf -dW "${BIN}" 2>/dev/null | grep -q 'NEEDED'; then
            echo "::error::${BIN} has dynamic library dependencies (DT_NEEDED) — the release binary must be fully static"
            exit 1
          fi
          echo "OK: ${BIN} has no DT_NEEDED (fully static)."

      - name: Package binary
        id: pkg
        run: |
          OUT="${BIN_NAME}-linux-${{ matrix.arch }}-v${{ needs.version.outputs.version }}"
          cp "target/${{ matrix.target }}/release/${BIN_NAME}" "${OUT}"
          chmod +x "${OUT}"
          echo "artifact=${OUT}" >> "$GITHUB_OUTPUT"

      - name: Sign binary (Ed25519) and append signature
        env:
          DN7_SIGN_KEY: ${{ secrets.DN7_SIGN_KEY }}
        run: |
          if [ -z "$DN7_SIGN_KEY" ]; then
            echo "::error::DN7_SIGN_KEY secret is not set — cannot sign release" >&2
            exit 1
          fi
          echo "$DN7_SIGN_KEY" > /tmp/dn7_sign.pem
          openssl pkeyutl -sign -inkey /tmp/dn7_sign.pem -rawin \
            -in "${{ steps.pkg.outputs.artifact }}" -out /tmp/dn7.sig
          rm -f /tmp/dn7_sign.pem
          sz=$(wc -c < /tmp/dn7.sig)
          test "$sz" = "64" || { echo "::error::unexpected signature size $sz" >&2; exit 1; }
          cat /tmp/dn7.sig >> "${{ steps.pkg.outputs.artifact }}"
          rm -f /tmp/dn7.sig
          echo "appended 64-byte signature to ${{ steps.pkg.outputs.artifact }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pkg.outputs.artifact }}
          path: ${{ steps.pkg.outputs.artifact }}

  release:
    needs: [version, build]
    if: needs.version.outputs.publish == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (with tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate changelog index (releases.json)
        run: python3 .github/gen_releases.py dist/releases.json

      - name: Compose release body (per-language notes from release.toml)
        id: body
        run: |
          notes=$(python3 -c "import tomllib; d=tomllib.load(open('release.toml','rb')); print('\n'.join(f'**{k}**\n\n{v}\n' for k,v in d.get('notes',{}).items()))")
          {
            echo "body<<DN7EOF"
            printf '%s\n' "$notes"
            echo "Static (musl) Linux build (x86_64 + arm64), Ed25519-signed and verified before self-update."
            echo "Commit: ${{ github.sha }}"
            echo "DN7EOF"
          } >> "$GITHUB_OUTPUT"

      # Each build is its OWN release, tagged b<build> at this commit (the tag's
      # existence is also what makes a re-push of the same build a gate-only run,
      # so the sequence is idempotent). Every release is marked Latest, so the
      # panel's `/releases/latest` self-update check always sees the newest build;
      # older builds' releases are retained (just no longer Latest). softprops
      # creates the b<build> tag itself, so there's no separate tag step.
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: b${{ needs.version.outputs.build }}
          target_commitish: ${{ github.sha }}
          name: ${{ needs.version.outputs.rel_name }}
          prerelease: false
          make_latest: 'true'
          body: ${{ steps.body.outputs.body }}
          files: dist/*
