name: Build Linux Release

# Build Linux release binaries on every push. The version is auto-incremented
# as 1.0.<run_number> (e.g. 1.0.1, 1.0.2, ...) and published as a GitHub Release
# with the compiled binaries (x86_64 + arm64) attached.
#
# Binaries are built for the *musl* targets and statically linked, so they run
# on any Linux distro/version regardless of its glibc (no more
# "GLIBC_2.xx not found"). The agent uses rustls (not OpenSSL), so a fully
# static musl build needs no system libraries at runtime.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  BIN_NAME: teaops-agent

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            arch: x86_64
          - target: aarch64-unknown-linux-musl
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute version (1.0.x)
        id: ver
        run: echo "version=1.0.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Stamp version into Cargo.toml
        run: |
          sed -i -E "0,/^version = \".*\"/s//version = \"${{ steps.ver.outputs.version }}\"/" Cargo.toml
          grep -m1 '^version' Cargo.toml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # `cross` runs the build inside a target-matched Docker image that already
      # has the musl cross toolchain + C compiler (needed by ring), so both the
      # x86_64 and aarch64 musl builds are fully static and portable.
      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build static musl binary
        run: cross build --release --target ${{ matrix.target }}

      - name: Package binary
        id: pkg
        run: |
          OUT="${BIN_NAME}-linux-${{ matrix.arch }}-v${{ steps.ver.outputs.version }}"
          cp "target/${{ matrix.target }}/release/${BIN_NAME}" "${OUT}"
          chmod +x "${OUT}"
          echo "artifact=${OUT}" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pkg.outputs.artifact }}
          path: ${{ steps.pkg.outputs.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Compute version (1.0.x)
        id: ver
        run: echo "version=1.0.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: v${{ steps.ver.outputs.version }}
          body: |
            Automated static (musl) Linux build of ${{ env.BIN_NAME }} v${{ steps.ver.outputs.version }} (x86_64 + arm64).
            Runs on any Linux regardless of glibc version.
            Commit: ${{ github.sha }}
          files: dist/*

      # Push the freshly built binaries straight to the backend's distribution
      # endpoint so it never needs to reach GitHub (the backend host is in a
      # region that can't access GitHub). Runs only on main pushes; fork PRs
      # never get here and never see the secret. Each arch is uploaded with its
      # sha256 for integrity verification on the backend.
      - name: Publish binaries to backend
        if: github.ref == 'refs/heads/main'
        env:
          PUBLISH_TOKEN: ${{ secrets.AGENT_PUBLISH_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
          BACKEND_URL: https://api.teaops.dn7.cn
        run: |
          set -e
          if [ -z "$PUBLISH_TOKEN" ]; then
            echo "AGENT_PUBLISH_TOKEN not set; skipping backend publish"; exit 0
          fi
          for arch in x86_64 arm64; do
            file="dist/${BIN_NAME}-linux-${arch}-v${VERSION}"
            if [ ! -f "$file" ]; then
              echo "missing $file; skipping $arch"; continue
            fi
            sha=$(sha256sum "$file" | awk '{print $1}')
            echo "publishing $arch (sha256=$sha)..."
            code=$(curl -sS -o /tmp/pub.out -w '%{http_code}' \
              -X POST \
              -H "Authorization: Bearer ${PUBLISH_TOKEN}" \
              --data-binary @"$file" \
              "${BACKEND_URL}/agent/dist/publish?version=${VERSION}&arch=${arch}&sha256=${sha}")
            echo "  -> HTTP $code $(cat /tmp/pub.out)"
            if [ "$code" != "200" ]; then
              echo "publish failed for $arch"; exit 1
            fi
          done
