name: Build Linux Release

# Build Linux release binaries on every push. The version is derived from the
# latest `v1.2.*` git tag (first release => 1.2.0, then 1.2.1, 1.2.2, ...), so
# it never skips a number and isn't coupled to the run counter. Binaries are
# built for the *musl* targets and statically linked, then signed (Ed25519) and
# published as a GitHub Release with the binaries + detached `.sig` attached.
#
# Signing: each binary is signed with the release private key (Actions secret
# DN7_SIGN_KEY, an Ed25519 PKCS8 PEM). Deployed panels verify the signature
# against an embedded public key before self-updating.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  BIN_NAME: dn7-panel

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - name: Checkout (with tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version (1.2.x)
        id: v
        run: |
          latest=$(git tag -l 'v1.2.*' | sort -V | tail -1)
          if [ -z "$latest" ]; then
            version="1.2.0"
          else
            patch=${latest##*.}
            version="1.2.$((patch + 1))"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "next version: $version"

  build:
    needs: version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            arch: x86_64
          - target: aarch64-unknown-linux-musl
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stamp version into Cargo.toml
        run: |
          sed -i -E "0,/^version = \".*\"/s//version = \"${{ needs.version.outputs.version }}\"/" Cargo.toml
          grep -m1 '^version' Cargo.toml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # `cross` runs the build inside a target-matched Docker image that already
      # has the musl cross toolchain + C compiler, so both the x86_64 and
      # aarch64 musl builds are fully static and portable.
      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build static musl binary
        run: cross build --release --target ${{ matrix.target }}

      - name: Package binary
        id: pkg
        run: |
          OUT="${BIN_NAME}-linux-${{ matrix.arch }}-v${{ needs.version.outputs.version }}"
          cp "target/${{ matrix.target }}/release/${BIN_NAME}" "${OUT}"
          chmod +x "${OUT}"
          echo "artifact=${OUT}" >> "$GITHUB_OUTPUT"

      - name: Sign binary (Ed25519) and append signature
        env:
          DN7_SIGN_KEY: ${{ secrets.DN7_SIGN_KEY }}
        run: |
          if [ -z "$DN7_SIGN_KEY" ]; then
            echo "::error::DN7_SIGN_KEY secret is not set — cannot sign release" >&2
            exit 1
          fi
          echo "$DN7_SIGN_KEY" > /tmp/dn7_sign.pem
          openssl pkeyutl -sign -inkey /tmp/dn7_sign.pem -rawin \
            -in "${{ steps.pkg.outputs.artifact }}" -out /tmp/dn7.sig
          rm -f /tmp/dn7_sign.pem
          # An Ed25519 signature is exactly 64 bytes.
          sz=$(wc -c < /tmp/dn7.sig)
          test "$sz" = "64" || { echo "::error::unexpected signature size $sz" >&2; exit 1; }
          # Append the signature to the END of the binary. The ELF loader
          # ignores trailing bytes, so the file still runs as-is; the panel
          # strips + verifies the trailer before self-updating.
          cat /tmp/dn7.sig >> "${{ steps.pkg.outputs.artifact }}"
          rm -f /tmp/dn7.sig
          echo "appended 64-byte signature to ${{ steps.pkg.outputs.artifact }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pkg.outputs.artifact }}
          path: ${{ steps.pkg.outputs.artifact }}

  release:
    needs: [version, build]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (with tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate changelog index (releases.json)
        env:
          NEW_VERSION: ${{ needs.version.outputs.version }}
        run: python3 .github/gen_releases.py dist/releases.json

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: v${{ needs.version.outputs.version }}
          body: |
            Automated static (musl) Linux build of ${{ env.BIN_NAME }} v${{ needs.version.outputs.version }} (x86_64 + arm64).
            Runs on any Linux regardless of glibc version.
            Each binary is Ed25519-signed (signature appended to the file) and verified by the panel before self-update.
            Commit: ${{ github.sha }}
          files: dist/*
