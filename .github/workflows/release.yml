name: Build Linux Release

# Build Linux release binaries on every push. Versioning is the <codename>
# <year>.<major>.<minor> scheme (see release.toml): codename/year/major are set
# by hand in release.toml; this workflow reads them and auto-increments the minor
# from the latest `v<year>.<major>.*` tag (first => .0), so it never skips a
# number and isn't coupled to the run counter. Binaries are built for the *musl*
# targets and statically linked, then signed (Ed25519) and published as a GitHub
# Release named "<codename> <version>" with the binaries + detached `.sig`.
#
# Signing: each binary is signed with the release private key (Actions secret
# DN7_SIGN_KEY, an Ed25519 PKCS8 PEM). Deployed panels verify the signature
# against an embedded public key before self-updating.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  BIN_NAME: dn7-panel

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      codename: ${{ steps.v.outputs.codename }}
      is_new: ${{ steps.v.outputs.is_new }}
      build_code: ${{ steps.v.outputs.build_code }}
      rel_name: ${{ steps.v.outputs.rel_name }}
      rel_tag: ${{ steps.v.outputs.rel_tag }}
    steps:
      - name: Checkout (with tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version + build code from release.toml
        id: v
        run: |
          version=$(python3 -c "import tomllib;print(tomllib.load(open('release.toml','rb'))['version'])")
          codename=$(python3 -c "import tomllib;print(tomllib.load(open('release.toml','rb'))['codename'])")
          # Build code <year><month-letter><NN>: month letter A–L from the COMMIT's
          # month (Jan=A…Dec=L); NN is a 2-digit sequence from 00 that resets each
          # month (max existing <prefix> tag + 1).
          mon=$(git show -s --format=%cd --date=format:%m HEAD); mon=$((10#$mon))
          letter=$(printf '%s' "ABCDEFGHIJKL" | cut -c "$mon")
          prefix="${version%%.*}${letter}"
          last=$(git tag -l "${prefix}*" | sed "s/^${prefix}//" | grep -E '^[0-9]+$' | sort -n | tail -1)
          if [ -z "$last" ]; then seq=0; else seq=$((10#$last + 1)); fi
          build_code=$(printf "%s%02d" "$prefix" "$seq")
          # A "real" version when release.toml's version is strictly greater than the
          # latest released one (or none exist) — otherwise it's a sub-build.
          latest=$(git tag -l 'v[0-9]*' | sed 's/^v//' | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)
          if [ -z "$latest" ]; then
            is_new=true
          elif [ "$version" != "$latest" ] && [ "$(printf '%s\n%s\n' "$latest" "$version" | sort -V | tail -1)" = "$version" ]; then
            is_new=true
          else
            is_new=false
          fi
          if [ "$is_new" = "true" ]; then
            rel_name="${codename} ${version}"; rel_tag="v${version}"
          else
            rel_name="${codename} ${version} (${build_code})"; rel_tag="${build_code}"
          fi
          {
            echo "version=$version"; echo "codename=$codename"; echo "is_new=$is_new"
            echo "build_code=$build_code"; echo "rel_name=$rel_name"; echo "rel_tag=$rel_tag"
          } >> "$GITHUB_OUTPUT"
          echo "→ ${rel_name}  (tag ${rel_tag}, prerelease=$([ "$is_new" = true ] && echo no || echo yes))"

  # Gate: formatting, lints (warnings = errors), and the test suite must pass
  # before anything is built/signed/released — so regressions and lint failures
  # can't reach a published release. Runs on the host (gnu) target; the final
  # static musl binaries are produced by the `build` job.
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (+ rustfmt, clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: check

      - name: Formatting
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace

      # Dependency vulnerability scan. Advisory-only (continue-on-error) so a new
      # advisory in a transitive dep with no available fix surfaces in the run
      # log without permanently blocking every release.
      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: Dependency audit
        continue-on-error: true
        run: cargo audit

      # Supply-chain gate: advisories + license policy + banned/duplicate crates
      # + source allow-list, per deny.toml. Advisory-only for license/ban drift
      # is avoided — this is a hard gate; tune deny.toml when it legitimately
      # flags a new (fixed) advisory or an additional permissive license.
      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - name: Dependency policy (cargo-deny)
        run: cargo deny check advisories bans licenses sources

  build:
    needs: [version, check]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            arch: x86_64
          - target: aarch64-unknown-linux-musl
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stamp version into Cargo.toml
        run: |
          sed -i -E "0,/^version = \".*\"/s//version = \"${{ needs.version.outputs.version }}\"/" Cargo.toml
          grep -m1 '^version' Cargo.toml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # `cross` runs the build inside a target-matched Docker image that already
      # has the musl cross toolchain + C compiler, so both the x86_64 and
      # aarch64 musl builds are fully static and portable.
      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      # One shipped binary: the panel. The unified `dn7` CLI is linked IN (crate
      # dn7-cli is a library) and invoked via the `dn7` symlink (argv[0]).
      - name: Build static musl binary
        run: cross build --release --target ${{ matrix.target }}

      # The flagship invariant: the released binary depends only on the Linux
      # kernel — no dynamic libraries, no external loader. Fail the release if any
      # DT_NEEDED appears (readelf reads cross-arch ELF fine on the x86_64 runner).
      - name: Verify fully static (no DT_NEEDED)
        run: |
          BIN="target/${{ matrix.target }}/release/${BIN_NAME}"
          echo "Dynamic section of ${BIN}:"
          readelf -dW "${BIN}" || true
          if readelf -dW "${BIN}" 2>/dev/null | grep -q 'NEEDED'; then
            echo "::error::${BIN} has dynamic library dependencies (DT_NEEDED) — the release binary must be fully static"
            exit 1
          fi
          echo "OK: ${BIN} has no DT_NEEDED (fully static)."

      - name: Package binary
        id: pkg
        run: |
          OUT="${BIN_NAME}-linux-${{ matrix.arch }}-v${{ needs.version.outputs.version }}"
          cp "target/${{ matrix.target }}/release/${BIN_NAME}" "${OUT}"
          chmod +x "${OUT}"
          echo "artifact=${OUT}" >> "$GITHUB_OUTPUT"

      - name: Sign binary (Ed25519) and append signature
        env:
          DN7_SIGN_KEY: ${{ secrets.DN7_SIGN_KEY }}
        run: |
          if [ -z "$DN7_SIGN_KEY" ]; then
            echo "::error::DN7_SIGN_KEY secret is not set — cannot sign release" >&2
            exit 1
          fi
          echo "$DN7_SIGN_KEY" > /tmp/dn7_sign.pem
          openssl pkeyutl -sign -inkey /tmp/dn7_sign.pem -rawin \
            -in "${{ steps.pkg.outputs.artifact }}" -out /tmp/dn7.sig
          rm -f /tmp/dn7_sign.pem
          sz=$(wc -c < /tmp/dn7.sig)
          test "$sz" = "64" || { echo "::error::unexpected signature size $sz" >&2; exit 1; }
          cat /tmp/dn7.sig >> "${{ steps.pkg.outputs.artifact }}"
          rm -f /tmp/dn7.sig
          echo "appended 64-byte signature to ${{ steps.pkg.outputs.artifact }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pkg.outputs.artifact }}
          path: ${{ steps.pkg.outputs.artifact }}

  release:
    needs: [version, build]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (with tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate changelog index (releases.json)
        env:
          NEW_VERSION: ${{ needs.version.outputs.version }}
        run: python3 .github/gen_releases.py dist/releases.json

      - name: Compose release body (per-language notes from release.toml)
        id: body
        run: |
          notes=$(python3 -c "import tomllib; d=tomllib.load(open('release.toml','rb')); print('\n'.join(f'**{k}**\n\n{v}\n' for k,v in d.get('notes',{}).items()))")
          {
            echo "body<<DN7EOF"
            printf '%s\n' "$notes"
            echo "Static (musl) Linux build (x86_64 + arm64), Ed25519-signed and verified before self-update."
            echo "Commit: ${{ github.sha }}"
            echo "DN7EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.rel_tag }}
          name: ${{ needs.version.outputs.rel_name }}
          # Sub-builds (version unchanged) are prereleases, so the panel's
          # `/releases/latest` self-update check skips them.
          prerelease: ${{ needs.version.outputs.is_new != 'true' }}
          body: ${{ steps.body.outputs.body }}
          files: dist/*

      # A real version's tag is v<version>; also drop its build-code tag so the
      # monthly build-code sequence stays consistent (sub-builds ARE tagged by
      # their build code, so they advance it on their own).
      - name: Tag build code (real versions)
        if: needs.version.outputs.is_new == 'true'
        run: |
          git tag "${{ needs.version.outputs.build_code }}" "${{ github.sha }}" || true
          git push origin "${{ needs.version.outputs.build_code }}" || true

      # Push the signed binaries to dn7.cn — the domestic "stable channel" — but
      # ONLY for real version bumps. Sub-builds are GitHub prereleases and never
      # feed the curated channel. The site authenticates the upload purely by the
      # appended Ed25519 signature (verified against the same embedded key the
      # panel trusts), so there is no shared token to manage. The binaries land as
      # a new (unstable) version; an operator promotes one to "stable" in the
      # dn7.cn admin backend. Override the target with the repo variable
      # DN7_INGEST_URL (default https://dn7.cn).
      - name: Push binaries to dn7.cn (real versions only)
        if: needs.version.outputs.is_new == 'true'
        env:
          SITE: ${{ vars.DN7_INGEST_URL || 'https://dn7.cn' }}
          V: ${{ needs.version.outputs.version }}
        run: |
          rc=0
          for arch in x86_64 arm64; do
            f="dist/${BIN_NAME}-linux-${arch}-v${V}"
            if [ ! -f "$f" ]; then
              echo "::error::missing artifact $f"; rc=1; continue
            fi
            echo "pushing $f -> $SITE/api/panel/ingest?version=${V}&arch=${arch}"
            code=$(curl -sS --retry 3 --retry-delay 5 -o /tmp/ingest_resp \
              -w '%{http_code}' -X POST --data-binary @"$f" \
              "$SITE/api/panel/ingest?version=${V}&arch=${arch}" || echo 000)
            echo "  http ${code}: $(cat /tmp/ingest_resp 2>/dev/null)"
            if [ "$code" != "200" ]; then
              echo "::error::ingest failed for ${arch} (http ${code})"; rc=1
            fi
          done
          exit $rc
